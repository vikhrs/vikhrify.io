<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ — Vikrify</title>
  <style>
    body { font-family:system-ui; background:#0f172a; color:#e2e8f0; margin:0; padding:20px; }
    h1 { color:#60a5fa; }
    table { width:100%; border-collapse:collapse; margin:20px 0; }
    th, td { padding:10px; border:1px solid #334155; text-align:left; }
    th { background:#1e293b; }
    .action-btn { padding:6px 10px; margin:2px; border-radius:4px; cursor:pointer; }
  </style>
</head>
<body>
  <h1>Админ-панель (пока заглушка)</h1>
  <p>Пользователей в системе: <strong id="user-count">—</strong></p>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Юзернейм</th>
        <th>Имя</th>
        <th>Баланс</th>
        <th>Premium</th>
        <th>Вериф.</th>
      </tr>
    </thead>
    <tbody id="users-table"></tbody>
  </table>

  <script>
    fetch('/api/users')  // Этого эндпоинта пока нет → добавь в server.js если нужно
      .then(r => r.json())
      .then(users => {
        document.getElementById('user-count').textContent = users.length;
        const tbody = document.getElementById('users-table');
        users.forEach(u => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${u.id}</td>
            <td>@${u.username}</td>
            <td>${u.name}</td>
            <td>${u.balance}</td>
            <td>${u.isPremium ? '✔' : '—'}</td>
            <td>${u.isVerified ? '✔' : '—'}</td>
          `;
          tbody.appendChild(tr);
        });
      })
      .catch(() => {
        document.getElementById('users-table').innerHTML = '<tr><td colspan="6" style="text-align:center;color:#f87171;">Нет подключения к API</td></tr>';
      });
  </script>
</body>
</html>
