<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Админ Vikhrify</title>
  <style>
    body { font-family:Arial; background:#000; color:#eee; padding:20px; }
    table { width:100%; border-collapse:collapse; margin:20px 0; }
    th,td { border:1px solid #333; padding:8px; text-align:left; }
    th { background:#222; }
    button { padding:6px 12px; margin:2px; cursor:pointer; }
    input { padding:4px; width:80px; }
  </style>
</head>
<body>
  <h1>Админ-панель</h1>
  <p>Пользователей: <b id="uc">0</b> | Постов: <b id="pc">0</b></p>

  <input id="search" placeholder="Поиск..." oninput="filter()" style="width:300px; margin-bottom:16px; padding:8px;">
  <table>
    <thead><tr><th>ID</th><th>@username</th><th>Имя</th><th>Баланс</th><th>Галочка</th><th>Статус</th><th>Действия</th></tr></thead>
    <tbody id="tbl"></tbody>
  </table>

  <script>
  const PASS = 'sehpy9-qiqjux-hofgyN';
  const headers = { 'x-admin-pass': PASS };

  async function loadAdmin() {
    const stats = await (await fetch('/api/admin/stats', {headers})).json();
    document.getElementById('uc').textContent = stats.usersCount;
    document.getElementById('pc').textContent = stats.postsCount;

    const users = await (await fetch('/api/admin/users', {headers})).json();
    const tbody = document.getElementById('tbl');
    tbody.innerHTML = '';
    users.forEach(u => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${u.id}</td>
        <td>@${u.username}</td>
        <td>${u.name}</td>
        <td>
          <input type="number" value="${u.balance}" id="bal${u.id}">
          <button onclick="update(${u.id}, 'balance', document.getElementById('bal${u.id}').value)">Сохранить</button>
        </td>
        <td>${u.isVerified ? '✔' : '—'} <button onclick="update(${u.id}, 'isVerified', ${!u.isVerified})">${u.isVerified ? 'Забрать' : 'Выдать'}</button></td>
        <td>${u.isBlocked ? 'Заблокирован' : 'Активен'} <button onclick="update(${u.id}, 'isBlocked', ${!u.isBlocked})">${u.isBlocked ? 'Разблокировать' : 'Заблокировать'}</button></td>
        <td></td>
      `;
      tbody.appendChild(tr);
    });
  }

  async function update(id, field, val) {
    await fetch('/api/admin/user', {
      method: 'PATCH',
      headers: { ...headers, 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, [field]: val })
    });
    loadAdmin();
  }

  function filter() {
    const q = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('#tbl tr').forEach(tr => {
      tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }

  loadAdmin();
  </script>
</body>
</html>
