<!-- admin.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikhrify Admin Panel</title>
    <link rel="stylesheet" href="admin-styles.css">
    <script src="admin-client.js" defer></script>
</head>
<body>
    <h1>Админ Панель Vikhrify</h1>
    <div id="stats">
        <p>Зарегистрировано пользователей: <span id="users-count"></span></p>
        <p>Опубликовано постов: <span id="posts-count"></span></p>
    </div>
    <input type="text" id="admin-search-username" placeholder="Поиск по username">
    <button onclick="adminSearchUser()">Поиск</button>
    <div id="admin-user-info"></div>
    <button onclick="toggleVerification()">Выдать/Забрать верификацию</button>
    <button onclick="toggleBlock()">Заблокировать/Разблокировать</button>
    <button onclick="viewUserChats()">Просмотреть чаты</button>
    <div id="user-chats"></div>
    <button onclick="deleteAllPosts()">Удалить все посты пользователя</button>
</body>
</html>
