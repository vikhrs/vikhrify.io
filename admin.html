<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify — Админ</title>
  <style>
    body { font-family: Arial, sans-serif; margin:20px; background:#f0f2f5; }
    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1px solid #ddd; padding:10px; text-align:left; }
    th { background:#e8f0fe; }
  </style>
</head>
<body>
  <h1>Vikhrify — Админ-панель</h1>
  <p>Пароль: <input id="adminPass" type="password" value="sehpy9-qiqjux-hofgyN"></p>
  <table id="userTable">
    <thead><tr><th>Юзернейм</th><th>Баланс</th><th>Галочка</th><th>Статус</th><th>Действия</th></tr></thead>
    <tbody id="usersBody"></tbody>
  </table>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    socket.on('connect', () => socket.emit('get_all_users'));

    socket.on('user_list', users => {
      const tbody = document.getElementById('usersBody');
      tbody.innerHTML = '';
      users.forEach(u => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${u.username}</td>
          <td>${u.balance}</td>
          <td>${u.verified ? '✔' : '—'}</td>
          <td style="color:${u.banned?'red':'green'}">${u.banned?'Заблокирован':'Активен'}</td>
          <td>
            <button onclick="adminAct('${u.username}','verify')">Дать галочку</button>
            <button onclick="adminAct('${u.username}','unverify')">Забрать</button><br>
            <button onclick="adminAct('${u.username}','ban')">Заблокировать</button>
            <button onclick="adminAct('${u.username}','unban')">Разблокировать</button><br>
            <button onclick="adminAct('${u.username}','add_balance',50)">+50</button>
            <button onclick="adminAct('${u.username}','add_balance',-50)">-50</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    });

    function adminAct(username, action, amount = null) {
      const pass = document.getElementById('adminPass').value;
      socket.emit('admin_action', { action, username, adminPass: pass, amount });
    }

    socket.on('admin_success', () => {
      alert('Выполнено');
      socket.emit('get_all_users');
    });
    socket.on('error', msg => alert(msg));
  </script>
</body>
</html>
