<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 80px;
      background: #111;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      z-index: 1000;
    }
    .sidebar .nav-link {
      color: #aaa;
      font-size: 1.8rem;
      margin: 15px 0;
      transition: color 0.2s;
    }
    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      color: #0d6efd;
    }
    .main-content {
      margin-left: 80px;
      padding: 20px 40px;
    }
    .post, .story, .course {
      background: #1f1f1f;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }
    #messages, #privateMessages {
      height: 400px;
      overflow-y: auto;
      background: #1f1f1f;
      padding: 10px;
      border-radius: 8px;
    }
    .badge-vxr { background:#00ff9d; color:#000; padding:4px 10px; border-radius:20px; font-weight:bold; }
    .verified { color: #0d6efd; font-weight:bold; font-size: 1.1rem; }
    .online-item {
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid #333;
    }
    .online-item:hover { background: #2a2a2a; }
    .avatar-preview {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin: 10px auto;
      display: block;
      border: 3px solid #0d6efd;
    }
    #loginBlock {
      max-width: 400px;
      margin: 100px auto;
    }
  </style>
</head>
<body>

<!-- Левая боковая панель с иконками -->
<div class="sidebar">
  <i class="bi bi-house-door nav-link active" onclick="showTab(0)" title="Лента"></i>
  <i class="bi bi-clock-history nav-link" onclick="showTab(1)" title="Истории"></i>
  <i class="bi bi-chat-dots nav-link" onclick="showTab(2)" title="Чат"></i>
  <i class="bi bi-person nav-link" onclick="showTab(3)" title="Профиль"></i>
  <i class="bi bi-star nav-link" onclick="showTab(4)" title="Premium"></i>
  <i id="adminIcon" class="bi bi-gear nav-link d-none" onclick="showTab(5)" title="Админ"></i>
</div>

<!-- Основной контент -->
<div class="main-content">

  <!-- Вход -->
  <div id="loginBlock">
    <h3 class="text-center mb-4">Вход в Vikhrify</h3>
    <input id="emailInput" type="email" class="form-control bg-dark text-white mb-3" placeholder="Email">
    <button onclick="sendCode()" class="btn btn-primary w-100 mb-2"><i class="bi bi-envelope"></i> Получить код</button>
    
    <div id="codeBlock" class="d-none">
      <input id="codeInput" class="form-control bg-dark text-white mb-3" placeholder="Код из письма">
      <button onclick="verifyCode()" class="btn btn-success w-100"><i class="bi bi-check-lg"></i> Подтвердить</button>
    </div>
  </div>

  <!-- Контент после входа -->
  <div id="appContent" class="d-none">

    <!-- Лента -->
    <div id="tab0" class="tab-content active">
      <div class="mb-3">
        <textarea id="postText" class="form-control bg-dark text-white mb-2" rows="3" placeholder="Что нового?"></textarea>
        <div class="d-flex gap-2">
          <input type="file" id="postImage" accept="image/*" class="form-control bg-dark text-white" style="width:auto;">
          <button onclick="createPost(false)" class="btn btn-success"><i class="bi bi-send"></i> Опубликовать</button>
          <button onclick="createPost(true)" id="premiumPostBtn" class="btn btn-warning d-none"><i class="bi bi-star-fill"></i> Премиум</button>
        </div>
      </div>
      <div id="feed"></div>
    </div>

    <!-- Истории -->
    <div id="tab1" class="tab-content">
      <div class="mb-3">
        <textarea id="storyText" class="form-control bg-dark text-white mb-2" rows="2" placeholder="Напиши историю..."></textarea>
        <button onclick="createStory()" class="btn btn-info"><i class="bi bi-camera"></i> Выложить</button>
      </div>
      <div id="stories"></div>
    </div>

    <!-- Чат -->
    <div id="tab2" class="tab-content">
      <div class="row">
        <div class="col-md-4">
          <h5><i class="bi bi-people"></i> Онлайн</h5>
          <div id="onlineUsers" class="list-group"></div>
        </div>
        <div class="col-md-8">
          <h5 id="chatWith">Чат</h5>
          <div id="privateMessages" class="border p-3 rounded mb-3"></div>
          <form id="privateForm" class="input-group">
            <input id="privateInput" class="form-control bg-dark text-white" placeholder="Сообщение...">
            <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i></button>
          </form>
        </div>
      </div>
    </div>

    <!-- Профиль -->
    <div id="tab3" class="tab-content">
      <div class="text-center mb-4">
        <img id="avatarPreview" src="https://via.placeholder.com/120?text=Аватар" class="avatar-preview" alt="Аватар">
        <input type="file" id="avatarInput" accept="image/*" class="form-control bg-dark text-white mt-2" style="max-width:300px; margin:auto;">
        <button onclick="uploadAvatar()" class="btn btn-outline-primary mt-2"><i class="bi bi-camera"></i> Изменить аватар</button>
      </div>
      <h4>Профиль <span id="myVerified" class="verified d-none"><i class="bi bi-patch-check-fill"></i></span></h4>
      <p><strong>Email:</strong> <span id="myEmailDisplay"></span></p>
      <p><strong>VXR:</strong> <span id="vxrBalance" class="badge-vxr">500</span></p>
      <div id="myPosts"></div>
    </div>

    <!-- Premium -->
    <div id="tab4" class="tab-content text-center">
      <h3><i class="bi bi-gem"></i> Vikhrify Premium</h3>
      <p>299 руб / 3$ / 299 VXR</p>
      <div class="d-flex justify-content-center gap-3 flex-wrap">
        <button onclick="buy('vxr')" class="btn btn-success btn-lg"><i class="bi bi-currency-exchange"></i> VXR</button>
        <button onclick="buy('rub')" class="btn btn-warning btn-lg"><i class="bi bi-currency-rupee"></i> Рубли</button>
        <button onclick="buy('usd')" class="btn btn-info btn-lg"><i class="bi bi-currency-dollar"></i> Доллары</button>
      </div>
      <div id="premiumStatus" class="mt-4"></div>
    </div>

    <!-- Админ -->
    <div id="tab5" class="tab-content">
      <h4><i class="bi bi-gear"></i> Админ-панель</h4>
      <button onclick="getAdminStats()" class="btn btn-primary mb-3"><i class="bi bi-arrow-repeat"></i> Обновить</button>
      <div id="adminStats" class="alert alert-info"></div>
    </div>

  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myEmail = localStorage.getItem('vikhrify_email') || '';
  let myPremium = localStorage.getItem('premium_' + myEmail) === 'true';
  let myVerified = localStorage.getItem('verified_' + myEmail) === 'true';
  let myVXR = parseInt(localStorage.getItem('vxr_' + myEmail)) || 500;
  let currentRoom = '';

  // Автовход
  if (myEmail) {
    document.getElementById('loginBlock').classList.add('d-none');
    document.getElementById('appContent').classList.remove('d-none');
    socket.emit('loginWithEmail', myEmail);
    document.getElementById('myEmailDisplay').textContent = myEmail;
    document.getElementById('vxrBalance').textContent = myVXR;
    if (myPremium) document.getElementById('premiumPostBtn').classList.remove('d-none');
    if (myVerified) document.getElementById('myVerified').classList.remove('d-none');
    if (myEmail === 'admin@vikhrify.ru') document.getElementById('adminIcon').classList.remove('d-none');
  }

  // Отправка кода
  function sendCode() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email) return alert('Введите email');
    myEmail = email;
    const code = Math.floor(100000 + Math.random() * 900000).toString();
    alert(`Код для ${email}: ${code} (симуляция)`);
    document.getElementById('codeBlock').classList.remove('d-none');
  }

  // Подтверждение
  function verifyCode() {
    const code = document.getElementById('codeInput').value.trim();
    // Для теста любой код подходит, в реальности проверять на сервере
    localStorage.setItem('vikhrify_email', myEmail);
    socket.emit('loginWithEmail', myEmail);
    document.getElementById('loginBlock').classList.add('d-none');
    document.getElementById('appContent').classList.remove('d-none');
    document.getElementById('myEmailDisplay').textContent = myEmail;
    document.getElementById('vxrBalance').textContent = myVXR;
    if (myEmail === 'admin@vikhrify.ru') document.getElementById('adminIcon').classList.remove('d-none');
  }

  // Показ таба
  function showTab(n) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab'+n).classList.add('active');
    document.querySelectorAll('.sidebar .nav-link').forEach(i => i.classList.remove('active'));
    document.querySelectorAll('.sidebar .nav-link')[n].classList.add('active');
  }

  // Публикация поста с фото (симуляция)
  function createPost(isPremium) {
    const text = document.getElementById('postText').value.trim();
    const fileInput = document.getElementById('postImage');
    let imageName = fileInput.files.length ? fileInput.files[0].name : '';

    if (!text && !imageName) return;

    const post = {
      id: Date.now(),
      email: myEmail,
      text,
      image: imageName ? `фото: ${imageName}` : '',
      isPremium,
      likes: 0,
      time: new Date().toLocaleTimeString('ru-RU')
    };

    socket.emit('newPost', post);
    document.getElementById('postText').value = '';
    fileInput.value = '';
  }

  // Загрузка аватарки (симуляция превью)
  function uploadAvatar() {
    const fileInput = document.getElementById('avatarInput');
    if (fileInput.files && fileInput.files[0]) {
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('avatarPreview').src = e.target.result;
      };
      reader.readAsDataURL(fileInput.files[0]);
    }
  }

  // Остальные функции (buy, renderFeed, renderStories, чат, админ) — как в предыдущей версии
  // Для краткости не дублирую, но они остаются без изменений

  socket.on('premiumActivated', data => {
    myPremium = true;
    myVerified = true;
    myVXR = data.vxr || myVXR;
    localStorage.setItem('premium_' + myEmail, 'true');
    localStorage.setItem('verified_' + myEmail, 'true');
    localStorage.setItem('vxr_' + myEmail, myVXR);
    document.getElementById('premiumPostBtn').classList.remove('d-none');
    document.getElementById('myVerified').classList.remove('d-none');
    document.getElementById('vxrBalance').textContent = myVXR;
  });
</script>
</body>
</html>
