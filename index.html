<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#111; color:#eee; }
    #auth { position:fixed; inset:0; background:#000c; display:flex; align-items:center; justify-content:center; z-index:100; }
    #auth.hidden { display:none; }
    .card { background:#222; padding:24px; border-radius:12px; width:90%; max-width:400px; }
    input, button, textarea { width:100%; padding:12px; margin:8px 0; border-radius:6px; border:none; font-size:1rem; box-sizing:border-box; }
    button { background:#0284c7; color:white; cursor:pointer; }
    nav { position:fixed; bottom:0; left:0; right:0; background:#1a1a1a; display:flex; }
    nav button { flex:1; padding:16px; background:none; border:none; color:#aaa; cursor:pointer; }
    nav button.active { color:#fff; background:#0284c7; }
    .section { display:none; padding:70px 16px 90px; }
    .section.active { display:block; }
    .post { background:#1e1e1e; padding:16px; margin:12px 0; border-radius:8px; }
    .post img { max-width:100%; border-radius:8px; margin-top:8px; }
    .avatar { width:48px; height:48px; border-radius:50%; object-fit:cover; cursor:pointer; }
    .verified::after { content:"✔"; color:#1da1f2; margin-left:4px; font-size:0.9em; }
    #sidebar { position:fixed; left:0; top:0; bottom:0; width:260px; background:#1a1a1a; transform:translateX(-100%); transition:0.3s; z-index:90; padding:16px; }
    #sidebar.open { transform:translateX(0); }
    .burger { position:fixed; left:12px; top:12px; font-size:28px; cursor:pointer; z-index:95; background:#222; padding:8px 14px; border-radius:8px; }
    .chat-list { list-style:none; padding:0; }
    .chat-item { padding:12px; border-bottom:1px solid #333; cursor:pointer; }
    .chat-item:hover { background:#222; }
    .messages { height:calc(100vh - 220px); overflow-y:auto; padding:12px; background:#0d1117; border-radius:8px; margin:12px 0; }
    .msg { margin:8px 0; padding:10px 14px; border-radius:18px; max-width:78%; }
    .sent { background:#0284c7; align-self:flex-end; margin-left:auto; }
    .received { background:#333; }
    .input-row { display:flex; gap:8px; }
    #chat-input { flex:1; }
  </style>
</head>
<body>

<div class="burger" onclick="toggleSidebar()">☰</div>

<div id="sidebar">
  <h3>Меню</h3>
  <input id="search-users" placeholder="Поиск по @username" oninput="searchUsers()">
  <div id="search-results"></div>
  <hr>
  <p><a href="#" onclick="show('feed'); toggleSidebar()">Лента</a></p>
  <p><a href="#" onclick="showMyPosts(); toggleSidebar()">Мои посты</a></p>
  <p><a href="#" onclick="alert('Мультиаккаунты — в разработке')">Сменить аккаунт</a></p>
  <p><a href="#" onclick="logout()">Выйти</a></p>
</div>

<div id="auth">
  <div class="card">
    <h2 style="text-align:center">Vikhrify</h2>
    <input id="name" placeholder="Имя">
    <input id="username" placeholder="Юзернейм (@)">
    <input id="password" type="password" placeholder="Пароль">
    <button onclick="register()">Зарегистрироваться</button>
    <button onclick="login()">Войти</button>
    <div id="auth-msg" style="margin-top:12px; text-align:center; min-height:20px;"></div>
  </div>
</div>

<div id="app" style="display:none">

  <div id="feed" class="section active">
    <h2>Лента</h2>
    <textarea id="post-text" placeholder="Что нового?" rows="3"></textarea>
    <input type="file" id="post-photo" accept="image/*">
    <button onclick="publishPost()">Опубликовать</button>
    <div id="posts-list"></div>
  </div>

  <div id="chats" class="section">
    <h2>Чаты</h2>
    <div id="chat-list-container">
      <ul id="chat-list" class="chat-list"></ul>
    </div>
    <div id="chat-view" style="display:none">
      <h3 id="chat-with"></h3>
      <div id="messages" class="messages"></div>
      <div class="input-row">
        <input id="chat-input" placeholder="Сообщение...">
        <button onclick="sendMessage()">→</button>
      </div>
    </div>
  </div>

  <div id="profile" class="section">
    <h2>Профиль</h2>
    <img id="my-avatar" class="avatar" src="https://via.placeholder.com/60">
    <p>Имя: <span id="my-name"></span> <button onclick="editProfile()">Изменить</button></p>
    <p>Юзернейм: @<span id="my-username"></span></p>
    <h3>Мои посты</h3>
    <div id="my-posts"></div>
  </div>

  <div id="user-profile" class="section" style="display:none">
    <h2>Профиль пользователя</h2>
    <img id="viewed-avatar" class="avatar" src="">
    <p>Имя: <span id="viewed-name"></span> <span id="viewed-verified"></span></p>
    <p>Юзернейм: @<span id="viewed-username"></span></p>
    <p>Подписчиков: <span id="viewed-followers">0</span></p>
    <button id="follow-btn" onclick="toggleFollow()">Подписаться</button>
    <button onclick="openChatWithUser()">Написать</button>
    <h3>Посты</h3>
    <div id="user-posts"></div>
  </div>

  <nav>
    <button class="active" onclick="show('feed')">Лента</button>
    <button onclick="show('chats')">Чаты</button>
    <button onclick="show('profile')">Профиль</button>
  </nav>
</div>

<script>
let user = null;
let currentChatUserId = null;
let chatKey = null;           // симметричный ключ для текущего чата
let pollingInterval = null;

const msg = document.getElementById('auth-msg');

// ─── Авторизация ───────────────────────────────────────
async function register() {
  msg.innerHTML = '';
  const name = document.getElementById('name').value.trim();
  const username = document.getElementById('username').value.trim().replace(/^@/, '');
  const password = document.getElementById('password').value;

  if (!name || !username || !password) return msg.innerHTML = '<span style="color:#f33">Заполните все поля</span>';

  try {
    const r = await fetch('/api/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, username, password})
    });
    const d = await r.json();
    if (d.success) {
      msg.innerHTML = '<span style="color:#0f0">Добро пожаловать в Vikhrfy!</span><br>Теперь войдите.';
    } else {
      msg.innerHTML = '<span style="color:#f33">' + (d.error || 'Ошибка') + '</span>';
    }
  } catch(e) { msg.innerHTML = '<span style="color:#f33">Ошибка сети</span>'; }
}

async function login() {
  msg.innerHTML = '';
  const username = document.getElementById('username').value.trim().replace(/^@/, '');
  const password = document.getElementById('password').value;

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const d = await r.json();
    if (d.success) {
      user = d.user;
      localStorage.setItem('vikhrify_user', JSON.stringify(user));
      document.getElementById('auth').classList.add('hidden');
      document.getElementById('app').style.display = 'block';
      startPolling();
      show('feed');
      loadProfile();
    } else {
      msg.innerHTML = '<span style="color:#f33">Неверные данные</span>';
    }
  } catch(e) { msg.innerHTML = '<span style="color:#f33">Ошибка сети</span>'; }
}

// Автовход
if (localStorage.getItem('vikhrify_user')) {
  user = JSON.parse(localStorage.getItem('vikhrify_user'));
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').style.display = 'block';
  startPolling();
  show('feed');
  loadProfile();
}

function logout() {
  localStorage.removeItem('vikhrify_user');
  location.reload();
}

// ─── Навигация ──────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
  document.getElementById(id).style.display = 'block';
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelector(`nav button[onclick="show('${id}')"]`)?.classList.add('active');
  if (id !== 'chats') document.getElementById('chat-view').style.display = 'none';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ─── Профиль и редактирование ──────────────────────────
async function loadProfile() {
  if (!user) return;
  const r = await fetch(`/api/me/${user.id}`);
  user = await r.json();
  localStorage.setItem('vikhrify_user', JSON.stringify(user));

  document.getElementById('my-name').textContent = user.name;
  document.getElementById('my-username').textContent = user.username;
  document.getElementById('my-avatar').src = user.avatar || 'https://via.placeholder.com/60';
}

async function editProfile() {
  const newName = prompt('Новое имя:', user.name);
  const file = prompt('Вставьте base64 аватара или оставьте пустым');
  let avatar = user.avatar;

  if (file && file.startsWith('data:image')) avatar = file;

  if (newName?.trim() || avatar !== user.avatar) {
    await fetch('/api/profile', {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({id: user.id, name: newName?.trim(), avatar})
    });
    loadProfile();
  }
}

// ─── Посты и лента ──────────────────────────────────────
async function loadPosts() {
  const r = await fetch('/api/posts');
  const all = await r.json();

  document.getElementById('posts-list').innerHTML = all.map(p => `
    <div class="post">
      <div style="display:flex;gap:12px;align-items:center;">
        <img src="\( {p.avatar}" class="avatar" onclick="openUserProfile( \){p.userId})">
        <div>
          <b class="\( {p.isVerified ? 'verified' : ''}" onclick="openUserProfile( \){p.userId})">${p.name}</b><br>
          @${p.username}
        </div>
      </div>
      <p>${p.content}</p>
      \( {p.image ? `<img src=" \){p.image}" alt="фото">` : ''}
      <small>${new Date(p.createdAt).toLocaleString()}</small>
    </div>
  `).join('');
}

async function publishPost() {
  const content = document.getElementById('post-text').value.trim();
  const file = document.getElementById('post-photo').files[0];

  if (!content) return alert('Напишите текст');

  let image = null;
  if (file) {
    const reader = new FileReader();
    reader.onload = async () => {
      image = reader.result;
      await sendPost(content, image);
    };
    reader.readAsDataURL(file);
  } else {
    await sendPost(content, null);
  }
}

async function sendPost(content, image) {
  await fetch('/api/posts', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({userId: user.id, content, image})
  });
  document.getElementById('post-text').value = '';
  document.getElementById('post-photo').value = '';
  loadPosts();
}

async function showMyPosts() {
  const r = await fetch('/api/posts');
  const my = (await r.json()).filter(p => p.userId === user.id);
  document.getElementById('my-posts').innerHTML = my.map(p => `
    <div class="post">
      <p>${p.content}</p>
      \( {p.image ? `<img src=" \){p.image}">` : ''}
      <small>${new Date(p.createdAt).toLocaleString()}</small>
    </div>
  `).join('');
  show('profile');
}

// ─── Профиль другого пользователя ──────────────────────
let viewedUser = null;

async function openUserProfile(id) {
  if (id === user.id) return show('profile');

  const r = await fetch(`/api/user/${id}`);
  viewedUser = await r.json();

  document.getElementById('viewed-name').textContent = viewedUser.name;
  document.getElementById('viewed-username').textContent = viewedUser.username;
  document.getElementById('viewed-avatar').src = viewedUser.avatar || 'https://via.placeholder.com/60';
  document.getElementById('viewed-verified').innerHTML = viewedUser.isVerified ? '✔' : '';
  document.getElementById('viewed-followers').textContent = viewedUser.followers?.length || 0;

  const followBtn = document.getElementById('follow-btn');
  followBtn.textContent = viewedUser.followers?.includes(user.id) ? 'Отписаться' : 'Подписаться';

  const pr = await fetch('/api/posts');
  const posts = (await pr.json()).filter(p => p.userId === id);
  document.getElementById('user-posts').innerHTML = posts.map(p => `
    <div class="post">
      <p>${p.content}</p>
      \( {p.image ? `<img src=" \){p.image}">` : ''}
      <small>${new Date(p.createdAt).toLocaleString()}</small>
    </div>
  `).join('');

  show('user-profile');
}

async function toggleFollow() {
  if (!viewedUser) return;
  await fetch('/api/follow', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ followerId: user.id, targetId: viewedUser.id })
  });
  openUserProfile(viewedUser.id);
}

// ─── Чаты ───────────────────────────────────────────────
async function loadChats() {
  if (!user) return;
  const r = await fetch(`/api/chats?userId=${user.id}`);
  const chats = await r.json();

  document.getElementById('chat-list').innerHTML = chats.map(c => `
    <li class="chat-item" onclick="openChat(\( {c.withUser.id}, ' \){c.withUser.name}')">
      <b>\( {c.withUser.name}</b><br>@ \){c.withUser.username}
      ${c.unread ? '<span style="color:#f33">•</span>' : ''}
    </li>
  `).join('');
}

async function openChat(userId, name) {
  currentChatUserId = userId;
  document.getElementById('chat-with').textContent = name;
  document.getElementById('chat-view').style.display = 'block';
  document.getElementById('chat-list-container').style.display = 'none';

  // Генерируем/получаем общий ключ (в реальности должен быть обмен ключами)
  chatKey = CryptoJS.MD5(user.id + '_' + userId).toString();

  loadMessages();
}

async function loadMessages() {
  if (!currentChatUserId) return;
  const r = await fetch(`/api/messages?userId=\( {user.id}&with= \){currentChatUserId}`);
  let msgs = await r.json();

  const container = document.getElementById('messages');
  container.innerHTML = '';

  msgs.forEach(m => {
    const isSent = m.from === user.id;
    let text = m.text;
    try {
      const bytes = CryptoJS.AES.decrypt(m.text, chatKey);
      text = bytes.toString(CryptoJS.enc.Utf8);
    } catch(e) {}
    
    const div = document.createElement('div');
    div.className = `msg ${isSent ? 'sent' : 'received'}`;
    div.textContent = text;
    container.appendChild(div);
  });

  container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !currentChatUserId) return;

  const encrypted = CryptoJS.AES.encrypt(text, chatKey).toString();

  await fetch('/api/messages', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      from: user.id,
      to: currentChatUserId,
      text: encrypted
    })
  });

  input.value = '';
  loadMessages();
}

// Поиск пользователей
async function searchUsers() {
  const q = document.getElementById('search-users').value.trim().toLowerCase();
  if (q.length < 2) {
    document.getElementById('search-results').innerHTML = '';
    return;
  }

  const r = await fetch(`/api/users/search?q=${encodeURIComponent(q)}`);
  const results = await r.json();

  document.getElementById('search-results').innerHTML = results.map(u => `
    <div style="padding:10px; border-bottom:1px solid #333; cursor:pointer"
         onclick="openUserProfile(${u.id}); toggleSidebar()">
      <b>\( {u.name}</b> @ \){u.username} ${u.isVerified?'✔':''}
    </div>
  `).join('');
}

// Polling
function startPolling() {
  if (pollingInterval) clearInterval(pollingInterval);
  pollingInterval = setInterval(() => {
    loadPosts();
    loadChats();
    if (currentChatUserId) loadMessages();
  }, 4000);
}

// Инициализация
loadPosts();
loadChats();
</script>
</body>
</html>
