<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vikrify</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; margin: 0; padding: 0; }
    header { background: #1a1a1a; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
    .tabs { display: flex; gap: 20px; margin: 20px; }
    .tab { padding: 10px 18px; background: #222; border-radius: 8px; cursor: pointer; }
    .tab.active { background: #0284c7; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    #profile, #chats, #posts { display: none; }
    #profile.active, #chats.active, #posts.active { display: block; }
    .card { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #0284c7; }
    .premium { background: #7c3aed; color: white; padding: 4px 10px; border-radius: 12px; font-size: 0.8em; }
    .verified { color: #60a5fa; font-size: 1.4em; margin-left: 6px; }
    input, button { padding: 10px; margin: 6px 0; border-radius: 6px; border: none; }
    button { background: #0284c7; color: white; cursor: pointer; }
    button:hover { background: #0369a1; }
    .chat-item { padding: 12px; background: #222; margin: 6px 0; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <h2>Vikrify</h2>
  <div>
    <button onclick="location.href='/admin'">Админ-панель</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('profile')">Профиль</div>
  <div class="tab" onclick="showTab('chats')">Чаты</div>
  <div class="tab" onclick="showTab('posts')">Посты</div>
</div>

<div class="container">

  <!-- Профиль -->
  <div id="profile" class="active">
    <div class="card">
      <div style="display:flex; align-items:center; gap:20px;">
        <img id="my-avatar" class="avatar" src="" alt="avatar">
        <div>
          <h2 id="my-name"></h2>
          <div style="display:flex; align-items:center; gap:8px;">
            <span id="my-username"></span>
            <span id="verified-badge" class="verified" style="display:none;">✔</span>
          </div>
          <div style="margin:10px 0;">
            Баланс: <b id="my-balance">0</b> VXR
            <button id="buy-premium" style="margin-left:15px; background:#7c3aed;" onclick="buyPremium()">Купить Premium (299 VXR)</button>
          </div>
        </div>
      </div>

      <button onclick="editProfile()">Редактировать профиль</button>

      <div id="edit-form" style="display:none; margin-top:20px;">
        <input id="edit-name" placeholder="Имя" style="width:100%;"/>
        <p style="color:#888; font-size:0.9em;">Юзернейм менять нельзя</p>
        <input type="file" id="edit-avatar" accept="image/*"/>
        <br/>
        <button onclick="saveProfile()">Сохранить</button>
        <button onclick="cancelEdit()" style="background:#444;">Отмена</button>
      </div>
    </div>
  </div>

  <!-- Чаты -->
  <div id="chats">
    <div class="card">
      <input id="search-username" placeholder="@username для нового чата" style="width:100%;"/>
      <button onclick="startChat()" style="margin-top:10px;">Написать</button>
    </div>
    <div id="chat-list">
      <!-- чаты будут здесь -->
    </div>
  </div>

  <!-- Посты -->
  <div id="posts">
    <div class="card">
      <textarea id="post-text" placeholder="Что у тебя нового?" rows="4" style="width:100%;"></textarea>
      <input type="file" id="post-image" accept="image/*"/>
      <br/>
      <button onclick="createPost()">Опубликовать</button>
    </div>
    <div id="posts-list"></div>
  </div>

</div>

<script>
  let currentUser = null;

  async function loadMe() {
    try {
      const r = await fetch('/api/me');
      currentUser = await r.json();
      document.getElementById('my-name').textContent = currentUser.name;
      document.getElementById('my-username').textContent = '@' + currentUser.
        username;
      document.getElementById('my-avatar').src = currentUser.avatar;
      document.getElementById('my-balance').textContent = currentUser.balance;
      if (currentUser.isVerified) document.getElementById('verified-badge').style.display = 'inline';
      if (currentUser.isPremium) document.getElementById('buy-premium').style.display = 'none';
    } catch(e) {
      console.error(e);
    }
  }

  function showTab(tabId) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[onclick*=" '${tabId}'"]`).classList.add('active');
    document.querySelectorAll('#profile, #chats, #posts').forEach(d => d.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
  }

  function editProfile() {
    document.getElementById('edit-name').value = currentUser.name;
    document.getElementById('edit-form').style.display = 'block';
  }

  async function saveProfile() {
    const name = document.getElementById('edit-name').value;
    const file = document.getElementById('edit-avatar').files[0];

    let avatar = currentUser.avatar;
    if (file) {
      // в реальном проекте → загрузка на сервер или cloudinary
      avatar = URL.createObjectURL(file); // пока локальный предпросмотр
    }

    await fetch('/api/profile', {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name, avatar })
    });

    loadMe();
    document.getElementById('edit-form').style.display = 'none';
  }

  function cancelEdit() {
    document.getElementById('edit-form').style.display = 'none';
  }

  async function buyPremium() {
    if (confirm("Списать 299 VXR за Premium?")) {
      const r = await fetch('/api/premium/buy', { method: 'POST' });
      const data = await r.json();
      if (data.success) {
        alert("Premium активирован!");
        loadMe();
      } else {
        alert(data.message);
      }
    }
  }

  function startChat() {
    const username = document.getElementById('search-username').value.trim().replace('@','');
    if (!username) return alert("Введите username");
    alert(`Открывается чат с @${username}\n(пока заглушка — реализуй через WebSocket или iframe)`);
  }

  async function createPost() {
    const text = document.getElementById('post-text').value.trim();
    if (!text) return alert("Напиши текст");
    await fetch('/api/posts', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ content: text })
    });
    document.getElementById('post-text').value = '';
    alert("Пост опубликован (пока в памяти сервера)");
  }

  // загрузка при старте
  loadMe();
</script>
</body>
</html>
