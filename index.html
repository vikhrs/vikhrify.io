<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Vikhrify | Живой проект</title>
    <style>
        body { margin:0; font-family:sans-serif; background:#050505; color:#eee; }
        .glass { background:rgba(30,30,30,0.6); backdrop-filter:blur(15px); border:1px solid rgba(255,255,255,0.1); }
        #auth { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:999; display:flex; align-items:center; justify-content:center; }
        .card { padding:30px; border-radius:20px; width:300px; text-align:center; }
        input, button { width:100%; padding:12px; margin:8px 0; border-radius:10px; border:none; box-sizing:border-box; background:#222; color:white; }
        button { background:#0284c7; cursor:pointer; }
        .burger { position:fixed; left:20px; top:20px; z-index:100; cursor:pointer; font-size:24px; }
        #sidebar { position:fixed; left:-260px; top:0; width:260px; height:100%; transition:0.3s; padding:60px 20px; z-index:99; }
        #sidebar.open { left:0; }
        .section { display:none; padding:80px 20px; }
        .section.active { display:block; }
        nav { position:fixed; bottom:0; left:0; right:0; display:flex; padding:10px; }
        nav button { flex:1; }
    </style>
</head>
<body>

<div id="auth">
    <div class="card glass">
        <h2 id="msg">Добро пожаловать в Vikhrify!</h2>
        <input id="in-name" placeholder="Ваше Имя">
        <input id="in-user" placeholder="Юзернейм">
        <input id="in-pass" type="password" placeholder="Пароль">
        <button onclick="register()">Регистрация</button>
        <button onclick="login()">Войти</button>
    </div>
</div>

<div id="burger" class="burger" onclick="toggleSidebar()">☰</div>
<div id="sidebar" class="glass">
    <button onclick="show('profile')">Профиль</button>
    <button onclick="logout()">Выйти</button>
</div>

<div id="app" style="display:none">
    <div id="feed" class="section active">
        <h2>Лента</h2>
        <textarea id="post-text" placeholder="Что нового?"></textarea>
        <button onclick="publishPost()">Опубликовать</button>
        <div id="posts-list"></div>
    </div>
    <div id="chats" class="section"><h2>Чаты</h2></div>
    <div id="profile" class="section"><h2>Профиль</h2></div>

    <nav class="glass">
        <button onclick="show('feed')">Лента</button>
        <button onclick="show('chats')">Чаты</button>
        <button onclick="show('profile')">Профиль</button>
    </nav>
</div>

<script>
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function show(id) { 
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active'); 
    }
    
    async function register() {
        const res = await fetch('/api/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: document.getElementById('in-name').value,
                username: document.getElementById('in-user').value,
                password: document.getElementById('in-pass').value
            })
        });
        if((await res.json()).success) document.getElementById('msg').innerText = "Успешно! Теперь войди.";
    }

    async function login() {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('in-user').value,
                password: document.getElementById('in-pass').value
            })
        });
        const data = await res.json();
        if(data.success) {
            localStorage.setItem('vikhrify_user', JSON.stringify(data.user));
            location.reload();
        }
    }

    if(localStorage.getItem('vikhrify_user')) {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'block';
    }

    function logout() { localStorage.removeItem('vikhrify_user'); location.reload(); }
</script>
</body>
</html>
