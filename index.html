<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <style>
    body { margin:0; padding:0; font-family:Arial,sans-serif; background:#0d1117; color:#c9d1d9; min-height:100vh; }
    #auth { position:fixed; inset:0; background:#0d1117; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.5rem; z-index:100; }
    #auth.hidden { display:none; }
    #app { display:none; padding:1rem; padding-bottom:6rem; max-width:900px; margin:0 auto; }
    h1,h2 { color:#58a6ff; text-align:center; }
    input, button { width:100%; max-width:360px; padding:0.8rem; margin:0.5rem 0; border-radius:6px; font-size:1rem; }
    input { border:1px solid #30363d; background:#161b22; color:white; }
    button { border:none; cursor:pointer; font-weight:bold; }
    .btn-reg { background:#238636; color:white; }
    .btn-log { background:#444c56; color:white; }
    .btn-premium { background:#9d7fff; color:black; }
    .btn-voice { background:#6e40c9; color:white; }
    .post { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:1rem; margin:1rem 0; }
    .avatar { width:40px; height:40px; border-radius:50%; background:#444; }
    nav { position:fixed; bottom:0; left:0; right:0; background:#000; display:flex; justify-content:space-around; padding:0.8rem 0; border-top:1px solid #333; }
    nav button { background:none; border:none; color:#aaa; font-size:0.9rem; cursor:pointer; }
    nav button.active { color:#58a6ff; }
    .section { display:none; }
    .section.active { display:block; }
    #msg { text-align:center; margin-top:1rem; font-size:1rem; }
    .ok { color:#3fb950; }
    .err { color:#f85149; }
  </style>
</head>
<body>

<div id="auth">
  <h1>Добро пожаловать в Vikhrify!</h1>
  <input id="name" placeholder="Имя (отображаемое)" type="text">
  <input id="username" placeholder="Юзернейм (логин)" type="text">
  <input id="password" placeholder="Пароль" type="password">
  <button class="btn-reg" onclick="reg()">Зарегистрироваться</button>
  <button class="btn-log" onclick="log()">Войти</button>
  <div id="msg"></div>
</div>

<div id="app">
  <h1>Добро пожаловать в Vikhrify</h1>

  <div id="feed" class="section active">
    <h2>Лента</h2>
    <div id="posts"></div>
    <button onclick="addPost()">+ Текстовой пост</button>
    <button class="btn-voice" onclick="addVoicePost()">+ Голосовой пост</button>
  </div>

  <div id="chats" class="section">
    <h2>Чаты</h2>
    <input id="chat-user" placeholder="Найти юзернейм">
    <button onclick="startChat()">Найти и написать</button>
    <div id="chat-area" style="margin-top:1rem; background:#161b22; padding:1rem; border-radius:8px;"></div>
  </div>

  <div id="profile" class="section">
    <h2>Профиль</h2>
    <img id="profile-photo" src="https://via.placeholder.com/100?text=Фото" alt="Фото" style="width:100px;height:100px;border-radius:50%;display:block;margin:0 auto;">
    <p>Имя: <span id="profile-name">—</span> <button onclick="editName()">Изменить</button></p>
    <p>Юзернейм: @<span id="profile-username">—</span></p>
    <p>Баланс: <span id="profile-balance">0 VXR</span></p>
    <p>Верификация: <span id="profile-verified">—</span></p>
    <p>Премиум: <span id="profile-premium">нет</span></p>
    <button class="btn-premium" onclick="buyPremium()">Купить премиум (500 VXR)</button>
  </div>

  <nav>
    <button onclick="showSection('feed')">Лента</button>
    <button onclick="showSection('chats')">Чаты</button>
    <button onclick="showSection('profile')">Профиль</button>
  </nav>
</div>

<script>
let currentUser = null;
const msg = document.getElementById('msg');
const nameInput = document.getElementById('name');
const usernameInput = document.getElementById('username');
const passwordInput = document.getElementById('password');

async function reg() {
  msg.innerHTML = '';
  
  const nameVal = nameInput.value.trim();
  const usernameVal = usernameInput.value.trim();
  const passwordVal = passwordInput.value.trim();
  if (!nameVal  !usernameVal  !passwordVal) {
    msg.innerHTML = '<span class="err">Заполни Имя, Юзернейм и Пароль</span>';
    return;
  }

  msg.innerHTML = '<span class="ok">Регистрирую...</span>';

  try {
    const response = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: nameVal,
        username: usernameVal,
        password: passwordVal
      })
    });

    const data = await response.json();

    if (data.success) {
      msg.innerHTML = '<span class="ok">Готово! Теперь войди</span>';
      nameInput.value = '';
      usernameInput.value = '';
      passwordInput.value = '';
    } else {
      msg.innerHTML = '<span class="err">' + (data.error || 'Ошибка регистрации') + '</span>';
    }
  } catch (err) {
    msg.innerHTML = '<span class="err">Не удалось подключиться к серверу</span>';
    console.error(err);
  }
}

async function log() {
  msg.innerHTML = '';
  
  const usernameVal = usernameInput.value.trim();
  const passwordVal = passwordInput.value.trim();

  if (!usernameVal || !passwordVal) {
    msg.innerHTML = '<span class="err">Заполни Юзернейм и Пароль</span>';
    return;
  }

  msg.innerHTML = '<span class="ok">Входим...</span>';

  try {
    const response = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: usernameVal,
        password: passwordVal
      })
    });

    const data = await response.json();

    if (data.success) {
      currentUser = data.user;
      msg.innerHTML = '<span class="ok">Вход успешен!</span>';
      setTimeout(() => {
        document.getElementById('auth').classList.add('hidden');
        document.getElementById('app').style.display = 'block';
        showSection('feed');
        loadPosts();
        loadProfile();
      }, 1000);
    } else {
      msg.innerHTML = '<span class="err">' + (data.error || 'Неверные данные') + '</span>';
    }
  } catch (err) {
    msg.innerHTML = '<span class="err">Не удалось подключиться</span>';
    console.error(err);
  }
}

// Остальные функции (showSection, loadPosts, addPost и т.д.) остаются без изменений
// ... (вставь их из своего старого кода, если они были рабочими)

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// ... остальные функции (loadPosts, addPost, addVoicePost, loadProfile, editName, buyPremium, startChat, sendChat)

document.getElementById('password').addEventListener('keypress', e => {
  if (e.key === 'Enter') log();
});
</script>
</body>
</html>
