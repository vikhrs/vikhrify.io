<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vikrify</title>
  <style>
    body { font-family: system-ui; background:#111; color:#eee; margin:0; padding:0; height:100vh; display:flex; flex-direction:column; }
    #welcome { position:fixed; inset:0; background:#000c; backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:100; }
    #welcome.hidden { display:none; }
    .card { background:#1e1e1e; padding:20px; border-radius:12px; margin:20px; max-width:400px; width:90%; }
    input, button, textarea { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:none; font-size:1em; box-sizing:border-box; }
    button { background:#0284c7; color:white; cursor:pointer; }
    button:hover { background:#0369a1; }
    .tabs { position:fixed; bottom:0; left:0; right:0; background:#1a1a1a; display:flex; justify-content:space-around; padding:10px 0; border-top:1px solid #333; }
    .tab { text-align:center; cursor:pointer; padding:8px; flex:1; font-size:0.95em; }
    .tab.active { background:#0284c7; border-radius:8px; }
    #profile, #chats, #posts { flex:1; overflow-y:auto; display:none; padding-bottom:80px; }
    #profile.active, #chats.active, #posts.active { display:block; }
    .avatar { width:90px; height:90px; border-radius:50%; border:3px solid #0284c7; object-fit:cover; }
    .post { background:#222; padding:16px; margin:12px 16px; border-radius:12px; }
  </style>
</head>
<body>

<!-- Приветственное окно -->
<div id="welcome">
  <div class="card">
    <h2 style="text-align:center; margin-bottom:8px;">Добро пожаловать в Vikrify</h2>
    <p style="text-align:center; color:#aaa; margin-bottom:20px;">Зарегистрируйся или войди</p>
    
    <input id="reg-name"     placeholder="Имя (например: Алексей)" />
    <input id="reg-username" placeholder="Юзернейм (без @)" />
    <input id="reg-password" type="password" placeholder="Пароль" />
    <button onclick="register()">Зарегистрироваться</button>
    
    <hr style="border:#444; margin:24px 0;" />
    
    <input id="login-username" placeholder="Юзернейм" />
    <input id="login-password" type="password" placeholder="Пароль" />
    <button onclick="login()">Войти</button>
  </div>
</div>

<!-- Профиль -->
<div id="profile">
  <div class="card" style="margin:16px;">
    <div style="display:flex; align-items:center; gap:16px;">
      <img id="my-avatar" class="avatar" src="https://i.pravatar.cc/150?u=default" alt="avatar">
      <div>
        <h2 id="my-name" style="margin:0;">—</h2>
        <p id="my-username" style="margin:4px 0; color:#aaa;">@—</p>
        <p style="margin:8px 0;">Баланс: <b id="my-balance">0</b> VXR</p>
      </div>
    </div>

    <h3 style="margin:20px 0 12px;">Мои посты</h3>
    <div id="my-posts"></div>
  </div>
</div>

<!-- Чаты (заглушка) -->
<div id="chats">
  <div class="card" style="margin:16px;">
    <h3>Чаты</h3>
    <p style="color:#aaa;">Пока в разработке...</p>
  </div>
</div>

<!-- Посты -->
<div id="posts">
  <div class="card" style="margin:16px;">
    <textarea id="post-text" placeholder="Что у тебя нового?" rows="4"></textarea>
    <button onclick="createPost()">Опубликовать</button>
  </div>
</div>

<!-- Нижняя панель -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('profile')">Профиль</div>
  <div class="tab" onclick="switchTab('chats')">Чаты</div>
  <div class="tab" onclick="switchTab('posts')">Посты</div>
</div>

<script>
  let currentUser = null;

  function hideWelcome() {
    document.getElementById('welcome').classList.add('hidden');
  }

  async function register() {
    const name     = document.getElementById('reg-name').value.trim();
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value.trim();

    if (!name  !username  !password) {
      return alert("Заполни все поля");
    }

    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, username, password })
      });

      const data = await res.json();

      if (data.success) {
        currentUser = data.user;
        loadProfile();
        hideWelcome();
        switchTab('profile');
      } else {
        alert(data.error || "Ошибка регистрации");
      }
    } catch (err) {
      alert("Ошибка сервера: " + err.message);
    }
  }

  async function login() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value.trim();

    if (!username || !password) {
      return alert("Введите юзернейм и пароль");
    }

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (data.success) {
        currentUser = data.user;
        loadProfile();
        hideWelcome();
        switchTab('profile');
      } else {
        alert(data.error || "Неверный логин или пароль");
      }
    } catch (err) {
      alert("Ошибка сервера: " + err.message);
    }
  }

  function switchTab(tabId) {
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');

    document.querySelectorAll('#profile, #chats, #posts').forEach(el => el.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');

    if (tabId === 'profile' && currentUser) {
      loadProfile();
    }
  }

  async function loadProfile() {
    if (!currentUser) return;

    try {
      const res = await fetch(`/api/me/${currentUser.id}`);
      currentUser = await res.json();

      document.getElementById('my-name').textContent     = currentUser.name;
      document.getElementById('my-username').textContent = '@' + currentUser.username;
      document.getElementById('my-avatar').src           = currentUser.avatar;
      document.getElementById('my-balance').textContent  = currentUser.balance;

      // Загрузка постов
      const postsRes = await fetch(`/api/posts/${currentUser.id}`);
      const myPosts = await postsRes.json();

      document.getElementById('my-posts').innerHTML = myPosts.length === 0
        ? '<p style="color:#888; text-align:center;">Пока нет постов</p>'
        : myPosts.map(p => `
            <div class="post">
              <p>${p.content.replace(/\n/g, '<br>')}</p>
              <small style="color:#888;">${new Date(p.createdAt).toLocaleString('ru-RU')}</small>
            </div>
          `).join('');
    } catch (err) {
      console.error(err);
      document.getElementById('my-posts').innerHTML = '<p style="color:#f00;">Ошибка загрузки</p>';
    }
  }

  async function createPost() {
    if (!currentUser) return alert("Сначала войди или зарегистрируйся");

    const content = document.getElementById('post-text').value.trim();
    if (!content) return alert("Напиши хоть что-то");

    try {
      await fetch('/api/posts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentUser.id, content })
      });

      document.getElementById('post-text').value = '';
      switchTab('profile');
      loadProfile();
      alert("Пост опубликован!");
    } catch (err) {
      alert("Ошибка: " + err.message);
    }
  }

  // Если хочешь автологин для теста (убери в проде)
  // currentUser = {id:1, name:"Тест", username:"test", balance:1000}; loadProfile(); hideWelcome();
</script>
</body>
</html>
