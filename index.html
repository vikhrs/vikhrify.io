<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <style>
    body { margin:0; padding:0; font-family:Arial,sans-serif; background:#0d1117; color:#c9d1d9; min-height:100vh; }
    #auth { position:fixed; inset:0; background:#0d1117; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.5rem; z-index:100; }
    #auth.hidden { display:none; }
    #app { display:none; padding:1rem; padding-bottom:6rem; max-width:900px; margin:0 auto; }
    h1,h2 { color:#58a6ff; text-align:center; }
    input, button { width:100%; max-width:360px; padding:0.8rem; margin:0.5rem 0; border-radius:6px; font-size:1rem; }
    input { border:1px solid #30363d; background:#161b22; color:white; }
    button { border:none; cursor:pointer; font-weight:bold; }
    .btn-reg { background:#238636; color:white; }
    .btn-log { background:#444c56; color:white; }
    #msg { text-align:center; margin-top:1rem; font-size:1rem; }
    .ok { color:#3fb950; }
    .err { color:#f85149; }
  </style>
</head>
<body>

<div id="auth">
  <h1>Добро пожаловать в Vikhrify!</h1>
  <input id="username" placeholder="Юзернейм" type="text">
  <input id="password" placeholder="Пароль" type="password">
  <button class="btn-reg" onclick="reg()">Зарегистрироваться</button>
  <button class="btn-log" onclick="log()">Войти</button>
  <div id="msg"></div>
</div>

<div id="app" style="display:none;">
  <h2>Ты внутри! Мессенджер работает.</h2>
  <!-- Тут потом добавишь чаты, ленту и т.д. -->
</div>

<script>
  console.log('Скрипт успешно загрузился — reg и log определены');

  function showMsg(text, isOk = false) {
    document.getElementById('msg').innerHTML = <span class="${isOk ? 'ok' : 'err'}">${text}</span>;
  }

  function reg() {
    console.log('reg вызвана');
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    if (!u || !p) return showMsg('Заполни всё!');
    showMsg('Регистрирую...', true);
    fetch('/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    }).then(r => r.json())
      .then(d => showMsg(d.success ? 'Готово! Входи' : d.error || 'Ошибка', d.success))
      .catch(() => showMsg('Сервер отвалился'));
  }

  function log() {
    console.log('log вызвана');
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    if (!u || !p) return showMsg('Заполни всё!');
    showMsg('Входим...', true);
    fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    }).then(r => r.json())
      .then(d => {
        if (d.success) {
          showMsg('Вошёл!', true);
          document.getElementById('auth').classList.add('hidden');
          document.getElementById('app').style.display = 'block';
        } else {
          showMsg(d.error || 'Неверный логин/пароль');
        }
      })
      .catch(() => showMsg('Сервер отвалился'));
  }
</script>
</body>
</html>
