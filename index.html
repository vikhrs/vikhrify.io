<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background:#0d0d0d; color:#fff; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    .post, .story { background:#1f1f1f; border-radius:12px; padding:15px; margin-bottom:15px; }
    #messages, #privateMessages { height:400px; overflow-y:auto; background:#1f1f1f; }
    .badge-vxr { background:#00ff9d; color:#000; padding:4px 10px; border-radius:20px; font-weight:bold; }
    .verified { color:#00ff9d; }
    .online-item { padding:10px; cursor:pointer; border-bottom:1px solid #333; }
    .online-item:hover { background:#2a2a2a; }
  </style>
</head>
<body class="container py-4">

<h1 class="text-center mb-4">🚀 Vikhrify</h1>

<!-- Выбор юзернейма -->
<div class="mb-4 text-center">
  <label>Выбери или добавь юзернейм:</label>
  <div class="input-group mb-2">
    <select id="usernameSelect" class="form-select bg-dark text-white">
      <option value="">— Выбери ник —</option>
      <option value="EdwardVikhr">EdwardVikhr</option>
      <option value="TestUser1">TestUser1</option>
      <option value="Alice_92">Alice_92</option>
      <option value="MaxPower">MaxPower</option>
      <option value="CoolGirl">CoolGirl</option>
      <option value="AdminTest">AdminTest</option>
      <option value="admin">admin (админ-панель)</option>
    </select>
    <button onclick="useSelected()" class="btn btn-primary">Войти</button>
  </div>
  <div class="input-group">
    <input id="newUsername" class="form-control bg-dark text-white" placeholder="Новый ник...">
    <button onclick="addNewUser()" class="btn btn-success">Добавить и войти</button>
  </div>
  <div id="currentUser" class="mt-2 text-success"></div>
</div>

<ul class="nav nav-tabs mb-4">
  <li class="nav-item"><a class="nav-link active" onclick="showTab(0)">Лента</a></li>
  <li class="nav-item"><a class="nav-link" onclick="showTab(1)">Истории</a></li>
  <li class="nav-item"><a class="nav-link" onclick="showTab(2)">Сообщения</a></li>
  <li class="nav-item"><a class="nav-link" onclick="showTab(3)">Профиль</a></li>
  <li class="nav-item"><a class="nav-link" onclick="showTab(4)">Premium</a></li>
  <li id="adminTab" class="nav-item d-none"><a class="nav-link" onclick="showTab(5)">Админ</a></li>
</ul>

<!-- Лента -->
<div id="tab0" class="tab-content active">
  <div class="input-group mb-3">
    <input id="postText" class="form-control bg-dark text-white" placeholder="Что нового?">
    <button onclick="createPost(false)" class="btn btn-success">Опубликовать</button>
    <button onclick="createPost(true)" id="premiumPostBtn" class="btn btn-warning d-none">Премиум-пост</button>
  </div>
  <div id="feed"></div>
</div>

<!-- Истории -->
<div id="tab1" class="tab-content">
  <div class="input-group mb-3">
    <input id="storyText" class="form-control bg-dark text-white" placeholder="История (только премиум)">
    <button onclick="createStory()" class="btn btn-info">Выложить</button>
  </div>
  <div id="stories"></div>
</div>

<!-- Сообщения -->
<div id="tab2" class="tab-content">
  <div class="row">
    <div class="col-md-4"><h5>Онлайн</h5><div id="onlineUsers" class="list-group"></div></div>
    <div class="col-md-8">
      <h5 id="chatWith">Выбери пользователя</h5>
      <div id="privateMessages" class="border p-3 rounded"></div>
      <form id="privateForm" class="input-group mt-3">
        <input id="privateInput" class="form-control bg-dark text-white" placeholder="Сообщение...">
        <button type="submit" class="btn btn-primary">Отправить</button>
      </form>
    </div>
  </div>
</div>

<!-- Профиль -->
<div id="tab3" class="tab-content">
  <h4>Профиль <span id="myVerified" class="verified d-none">✅ Верифицирован</span></h4>
  <p>Баланс VXR: <span id="vxrBalance" class="badge-vxr">500</span></p>
  <div id="myPosts"></div>
</div>

<!-- Premium -->
<div id="tab4" class="tab-content text-center">
  <h3>Vikhrify Premium — 299 руб / 3$ / 299 VXR</h3>
  <button onclick="buy('vxr')" class="btn btn-lg btn-success m-2">За 299 VXR</button>
  <button onclick="buy('rub')" class="btn btn-lg btn-warning m-2">За рубли</button>
  <button onclick="buy('usd')" class="btn btn-lg btn-info m-2">За доллары</button>
  <div id="premiumStatus"></div>
</div>

<!-- Админ -->
<div id="tab5" class="tab-content">
  <h4>Админ-панель Vikhrify</h4>
  <button onclick="getAdminStats()" class="btn btn-primary">Обновить статистику</button>
  <div id="adminStats" class="alert alert-info mt-3"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myUsername = localStorage.getItem('vikhrify_username') || '';
  let myPremium = false;
  let myVerified = false;
  let myVXR = 500;
  let currentRoom = '';

  if (myUsername) {
    document.getElementById('currentUser').innerHTML = `Текущий: <b>${myUsername}</b>`;
    socket.emit('setUsername', myUsername);
  }

  function useSelected() {
    const val = document.getElementById('usernameSelect').value;
    if (val) login(val);
  }

  function addNewUser() {
    const val = document.getElementById('newUsername').value.trim();
    if (val) login(val);
  }

  function login(username) {
    myUsername = username;
    localStorage.setItem('vikhrify_username', username);
    socket.emit('setUsername', username);
    document.getElementById('currentUser').innerHTML = `Текущий: <b>${username}</b>`;
    if (username.toLowerCase() === 'admin') document.getElementById('adminTab').classList.remove('d-none');
    alert(`Вошёл как ${username}`);
  }

  function showTab(n) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab'+n).classList.add('active');
  }

  function createPost(isPremium) {
    const text = document.getElementById('postText').value.trim();
    if (text) socket.emit('newPost', { text, isPremium });
    document.getElementById('postText').value = '';
  }

  function createStory() {
    const text = document.getElementById('storyText').value.trim();
    if (text) socket.emit('newStory', text);
    document.getElementById('storyText').value = '';
  }

  function buy(method) {
    socket.emit('buyPremium', method);
  }

  function getAdminStats() {
    socket.emit('getAdminStats');
  }

  // Рендеры (упрощённые, но полностью рабочие)
  function renderFeed(posts) {
    let html = '';
    posts.forEach(p => {
      if (p.isPremium && !myPremium) return;
      html += `<div class="post"><strong>${p.username} ${p.isPremium ? '⭐' : ''}</strong> <small>${p.time}</small><br>${p.text}<br>
        <button onclick="likePost(${p.id})">❤️ ${p.likes}</button>
        <button onclick="commentPost(${p.id})">💬</button></div>`;
    });
    document.getElementById('feed').innerHTML = html || '<p>Постов пока нет</p>';
  }

  function likePost(id) { socket.emit('likePost', id); }
  function commentPost(id) {
    const txt = prompt('Комментарий:');
    if (txt) socket.emit('newComment', { postId: id, comment: txt });
  }

  function renderStories(st) {
    let html = '';
    st.forEach(s => html += `<div class="story"><strong>${s.username}:</strong> ${s.text}</div>`);
    document.getElementById('stories').innerHTML = html || '<p>Историй нет</p>';
  }

  // Онлайн
  socket.on('usersList', list => {
    let html = '';
    list.forEach(u => {
      if (u.username === myUsername) return;
      html += `<div class="online-item" onclick="openPrivateChat('${u.username}')">${u.username} ${u.premium?'⭐':''} ${u.verified?'✅':''}</div>`;
    });
    document.getElementById('onlineUsers').innerHTML = html || 'Никого онлайн';
  });

  function openPrivateChat(target) {
    currentRoom = [myUsername, target].sort().join('_');
    document.getElementById('chatWith').textContent = `Чат с ${target}`;
    socket.emit('startPrivateChat', target);
    showTab(2);
  }

  // Остальные сокеты (premium, чат и т.д.)
  socket.on('postsUpdate', renderFeed);
  socket.on('storiesUpdate', renderStories);
  socket.on('premiumActivated', data => {
    myPremium = true;
    myVerified = true;
    myVXR = data.vxr;
    document.getElementById('premiumPostBtn').classList.remove('d-none');
    document.getElementById('myVerified').classList.remove('d-none');
    document.getElementById('premiumStatus').innerHTML = `<div class="alert alert-success">✅ Премиум + верификация активированы! VXR: ${myVXR}</div>`;
  });
  socket.on('premiumError', msg => alert(msg));
  socket.on('adminStats', stats => {
    document.getElementById('adminStats').innerHTML = `Зарегистрировано: ${stats.totalRegistered}<br>Онлайн: ${stats.online}<br>Премиум: ${stats.premium}<br>Верифицировано: ${stats.verified}`;
  });

  // Приватный чат (упрощённо)
  const privateForm = document.getElementById('privateForm');
  privateForm.addEventListener('submit', e => {
    e.preventDefault();
    const text = document.getElementById('privateInput').value.trim();
    if (text && currentRoom) {
      socket.emit('privateMessage', { room: currentRoom, text });
      document.getElementById('privateInput').value = '';
    }
  });

  socket.on('privateMessage', msg => {
    const div = document.getElementById('privateMessages');
    div.innerHTML += `<div><strong>${msg.from}:</strong> ${msg.text}</div>`;
    div.scrollTop = div.scrollHeight;
  });
</script>
</body>
</html>
