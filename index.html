<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background:#0d0d0d; color:#fff; margin:0; font-family:sans-serif; }
    .sidebar {
      position: fixed; left:0; top:0; bottom:0; width:80px;
      background:#111; border-right:1px solid #222;
      display:flex; flex-direction:column; align-items:center; padding-top:20px;
      z-index:1000;
    }
    .sidebar i {
      font-size:2rem; color:#aaa; margin:25px 0; cursor:pointer; transition:0.25s;
    }
    .sidebar i:hover, .sidebar i.active { color:#0d6efd; transform:scale(1.2); }
    .main { margin-left:80px; padding:20px; }
    .fab {
      position:fixed; bottom:20px; right:20px; width:60px; height:60px;
      background:#0d6efd; border-radius:50%; color:white; font-size:2.5rem;
      display:flex; align-items:center; justify-content:center; box-shadow:0 4px 15px rgba(13,110,253,0.5);
      cursor:pointer; z-index:999;
    }
    .fab:hover { transform:scale(1.1); }
    .post { background:#1f1f1f; border-radius:10px; padding:15px; margin-bottom:15px; }
    @media (max-width:768px) {
      .sidebar { bottom:0; top:auto; height:70px; flex-direction:row; justify-content:space-around; }
      .main { margin-left:0; margin-bottom:80px; padding:15px; }
    }
  </style>
</head>
<body>

<!-- Боковая панель -->
<div class="sidebar">
  <i class="bi bi-house-door active" onclick="showTab(0)"></i>
  <i class="bi bi-clock-history" onclick="showTab(1)"></i>
  <i class="bi bi-chat-dots" onclick="showTab(2)"></i>
  <i class="bi bi-person" onclick="showTab(3)"></i>
  <i class="bi bi-star" onclick="showTab(4)"></i>
  <i id="adminIcon" class="bi bi-gear d-none" onclick="showTab(5)"></i>
</div>

<!-- Кнопка + -->
<div class="fab" onclick="openPostModal()"><i class="bi bi-plus-lg"></i></div>

<div class="main">

  <!-- Лента (по умолчанию) -->
  <div id="tab0">
    <div id="feed"></div>
  </div>

  <!-- Другие вкладки (можно расширить) -->
  <div id="tab1" style="display:none;">Истории (пока пусто)</div>
  <div id="tab2" style="display:none;">Чат (пока пусто)</div>
  <div id="tab3" style="display:none;">Профиль</div>
  <div id="tab4" style="display:none;">Premium</div>
  <div id="tab5" style="display:none;">Админ-панель</div>

</div>

<!-- Модалка входа -->
<div class="modal fade" id="loginModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title">Вход</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input id="email" class="form-control bg-secondary mb-3" placeholder="Email" type="email">
        <button class="btn btn-primary w-100 mb-3" onclick="sendCode()">Получить код</button>
        <input id="code" class="form-control bg-secondary mb-3 d-none" placeholder="Код" maxlength="6">
        <button id="verifyBtn" class="btn btn-success w-100 d-none" onclick="verifyCode()">Подтвердить</button>
      </div>
    </div>
  </div>
</div>

<!-- Модалка поста -->
<div class="modal fade" id="postModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title">Новый пост</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <textarea id="postContent" class="form-control bg-secondary mb-3" rows="4" placeholder="Что нового?"></textarea>
        <button class="btn btn-success w-100" onclick="publishPost()">Опубликовать</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myEmail = localStorage.getItem('vikhrify_email') || '';

  function showTab(n) {
    document.querySelectorAll('.main > div').forEach(d => d.style.display = 'none');
    document.getElementById('tab' + n).style.display = 'block';
    document.querySelectorAll('.sidebar i').forEach(i => i.classList.remove('active'));
    document.querySelectorAll('.sidebar i')[n].classList.add('active');
  }

  function openPostModal() {
    if (!myEmail) {
      new bootstrap.Modal(document.getElementById('loginModal')).show();
    } else {
      new bootstrap.Modal(document.getElementById('postModal')).show();
    }
  }

  async function sendCode() {
    const email = document.getElementById('email').value.trim();
    if (!email) return alert('Введите email');

    try {
      const r = await fetch('/api/send-code', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email })
      });
      const data = await r.json();
      if (data.success) {
        alert('Код отправлен на почту');
        document.getElementById('code').classList.remove('d-none');
        document.getElementById('verifyBtn').classList.remove('d-none');
      } else {
        alert(data.message || 'Ошибка');
      }
    } catch (e) {
      alert('Ошибка сети');
    }
  }

  async function verifyCode() {
    const email = document.getElementById('email').value.trim();
    const code = document.getElementById('code').value.trim();

    const r = await fetch('/api/verify-code', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email, code })
    });
    const data = await r.json();

    if (data.success) {
      localStorage.setItem('vikhrify_email', email);
      myEmail = email;
      bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
      alert('Вход успешен!');
      if (email === 'admin@vikhrify.ru') {
        document.getElementById('adminIcon').classList.remove('d-none');
      }
    } else {
      alert(data.message || 'Неверный код');
    }
  }

  function publishPost() {
    const text = document.getElementById('postContent').value.trim();
    if (!text) return;
    socket.emit('newPost', { text, email: myEmail });
    document.getElementById('postContent').value = '';
    bootstrap.Modal.getInstance(document.getElementById('postModal')).hide();
  }

  // Пример рендера постов
  socket.on('newPost', post => {
    const feed = document.getElementById('feed');
    const div = document.createElement('div');
    div.className = 'post';
    div.innerHTML = `<strong>${post.email.split('@')[0]}</strong><br>${post.text}<small> • ${post.time}</small>`;
    feed.prepend(div);
  });
</script>
</body>
</html>
