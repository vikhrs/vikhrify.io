<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --text: #c9d1d9;
      --accent: #58a6ff;
      --success: #238636;
      --success-hover: #2ea043;
      --border: #30363d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    #auth {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0d1117 0%, #0a0e14 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    #auth.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #app {
      display: none;
      padding: 1rem;
      padding-bottom: 5rem;
      max-width: 800px;
      margin: 0 auto;
    }

    h1, h2 {
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .welcome {
      font-size: 1.8rem;
      text-align: center;
      margin: 2rem 0 1.5rem;
      color: var(--accent);
      animation: fadeIn 1.2s ease-out;
    }

    input {
      width: 100%;
      max-width: 360px;
      padding: 0.9rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      color: white;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88,166,255,0.2);
    }

    button {
      padding: 0.9rem 1.8rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--success);
      color: white;
    }

    .btn-primary:hover {
      background: var(--success-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #444c56;
      color: white;
    }

    .btn-secondary:hover {
      background: #586069;
    }

    .post {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem;
      margin-bottom: 1.2rem;
      transition: transform 0.15s;
    }

    .post:hover {
      transform: translateY(-2px);
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #444;
      background-size: cover;
    }

    .username {
      font-weight: 600;
      color: var(--accent);
    }

    nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(13,17,23,0.92);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-around;
      padding: 0.8rem 0;
      border-top: 1px solid var(--border);
      z-index: 90;
    }

    nav button {
      background: none;
      border: none;
      color: #8b949e;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0.5rem 1rem;
      transition: color 0.2s;
    }

    nav button:hover,
    nav button.active {
      color: var(--accent);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      #auth { gap: 1.2rem; }
      input { max-width: 90%; }
      button { width: 90%; max-width: 360px; }
    }
  </style>
</head>
<body>

<div id="auth">
  <h2>Vikhrify</h2>
  <input id="username" placeholder="Username" type="text" autocomplete="off">
  <input id="password" placeholder="Password" type="password" autocomplete="off">
  <button class="btn-primary" onclick="register()">Sign Up</button>
  <button class="btn-secondary" onclick="login()">Log In</button>
</div>

<div id="app">
  <h1 class="welcome">Добро пожаловать в Vikhrify!</h1>
  <p style="text-align:center; color:#8b949e; margin-bottom:2rem;">
    You are logged in as <strong id="current-user">...</strong>
  </p>

  <!-- Лента (пример постов) -->
  <div id="feed">
    <div class="post">
      <div class="post-header">
        <div class="avatar" style="background-image:url('https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100');"></div>
        <span class="username">@alex_v</span>
      </div>
      <p>Just launched my new side project on Vikhrify 🔥 What do you think?</p>
      <div style="margin-top:0.8rem; color:#8b949e;">❤️ 142 · 💬 28 · 2h ago</div>
    </div>

    <div class="post">
      <div class="post-header">
        <div class="avatar" style="background-image:url('https://images.unsplash.com/photo-1552058544-f2b08422138a?w=100');"></div>
        <span class="username">@maria_design</span>
      </div>
      <p>Dark mode vibes only 🌙 Who's with me?</p>
      <div style="margin-top:0.8rem; color:#8b949e;">❤️ 89 · 💬 15 · 45m ago</div>
    </div>
  </div>

  <!-- Нижняя навигация -->
  <nav>
    <button class="active">Feed</button>
    <button>Chats</button>
    <button>Profile</button>
    <button onclick="createPost()">+</button>
  </nav>
</div>

<script>
console.log("Vikhrify — full version loaded");

function register() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) {
    alert("Please enter username and password");
    return;
  }

  fetch("/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        alert(data.message || "Добро пожаловать в Vikhrify!");
        showApp(username);
      } else {
        alert(data.error || "Registration failed (maybe username taken?)");
      }
    })
    .catch(err => {
      console.error(err);
      alert("Cannot connect to server. Is backend running?");
    });
}

function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) {
    alert("Please enter username and password");
    return;
  }

  fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        alert("Добро пожаловать в Vikhrify!");
        showApp(username);
      } else {
        alert(data.error || "Wrong username or password");
      }
    })
    .catch(err => {
      console.error(err);
      alert("Cannot connect to server");
    });
}

function showApp(username) {
  document.getElementById("auth").classList.add("hidden");
  setTimeout(() => {
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
  }, 500);

  document.getElementById("current-user").textContent = username;
}

function createPost() {
  const text = prompt("What's on your mind?");
  if (text) {
    alert("Post created (in real version it would go to server):\n\n" + text);
    // Здесь можно добавить fetch('/posts', ...) когда бэкенд готов
  }
}
</script>
</body>
</html>
