<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <style>
    body { margin:0; padding:0; font-family:Arial,sans-serif; background:#0d1117; color:#c9d1d9; min-height:100vh; }
    #auth { position:fixed; inset:0; background:#0d1117; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.5rem; z-index:100; }
    #auth.hidden { display:none; }
    #app { display:none; padding:1rem; padding-bottom:6rem; max-width:900px; margin:0 auto; }
    h1,h2 { color:#58a6ff; text-align:center; }
    input, button { width:100%; max-width:360px; padding:0.8rem; margin:0.5rem 0; border-radius:6px; font-size:1rem; }
    input { border:1px solid #30363d; background:#161b22; color:white; }
    button { border:none; cursor:pointer; font-weight:bold; }
    .btn-reg { background:#238636; color:white; }
    .btn-log { background:#444c56; color:white; }
    .btn-premium { background:#9d7fff; color:black; }
    .btn-voice { background:#6e40c9; color:white; }
    .post { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:1rem; margin:1rem 0; }
    .post img { max-width:100%; border-radius:8px; margin-top:0.5rem; }
    .avatar { width:40px; height:40px; border-radius:50%; background:#444; }
    nav { position:fixed; bottom:0; left:0; right:0; background:#000; display:flex; justify-content:space-around; padding:0.8rem 0; border-top:1px solid #333; }
    nav button { background:none; border:none; color:#aaa; font-size:0.9rem; cursor:pointer; }
    nav button.active { color:#58a6ff; }
    .section { display:none; }
    .section.active { display:block; }
    #msg { text-align:center; margin-top:1rem; font-size:1rem; }
    .ok { color:#3fb950; }
    .err { color:#f85149; }
  </style>
</head>
<body>

<div id="auth">
  <h1>Добро пожаловать в Vikhrify!</h1>
  <input id="username" placeholder="Юзернейм" type="text">
  <input id="password" placeholder="Пароль" type="password">
  <button class="btn-reg" onclick="reg()">Зарегистрироваться</button>
  <button class="btn-log" onclick="log()">Войти</button>
  <div id="msg"></div>
</div>

<div id="app">
  <div id="feed" class="section active">
    <h2>Лента</h2>
    <div id="posts"></div>
  </div>

  <nav>
    <button data-section="feed" onclick="showSection('feed')">Лента</button>
  </nav>
</div>

<script>
  console.log('Скрипт загружен');

  let currentUser = null;
  const msg = document.getElementById('msg');
  const auth = document.getElementById('auth');
  const app = document.getElementById('app');

  function showMsg(text, ok = false) {
    msg.innerHTML = <span class="${ok ? 'ok' : 'err'}">${text}</span>;
  }

  async function reg() {
    console.log('reg()');
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    if (!u || !p) return showMsg('Заполни всё');
    showMsg('Регистрирую...', true);
    try {
      const res = await fetch('/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: u, password: p})
      });
      const data = await res.json();
      showMsg(data.success ? 'Готово! Входи' : data.error || 'Ошибка', data.success);
    } catch {
      showMsg('Сервер не отвечает');
    }
  }

  async function log() {
    console.log('log()');
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    if (!u || !p) return showMsg('Заполни всё');
    showMsg('Входим...', true);
    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: u, password: p})
      });
      const data = await res.json();
      if (data.success) {
        currentUser = u;
        showMsg('Вошёл!', true);
        auth.classList.add('hidden');
        app.style.display = 'block';
      } else {
        showMsg(data.error || 'Неверно');
      }
      } catch {
      showMsg('Сервер не отвечает');
    }
  }

  function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id)?.classList.add('active');
  }
</script>
</body>
</html>
