
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikhrify Pro</title>
    <style>
        :root { --bg: #000; --text: #fff; }
        body { margin:0; background:var(--bg); color:var(--text); font-family:sans-serif; }
        .glass { background:rgba(20,20,20,0.8); backdrop-filter:blur(20px); border:1px solid #333; }
        .nav { position:fixed; bottom:0; width:100%; display:flex; padding:20px; box-sizing:border-box; }
        .post { padding:20px; border-bottom:1px solid #222; }
        .btn-follow { background:#0284c7; padding:8px 16px; border-radius:20px; border:none; color:white; cursor:pointer; }
    </style>
</head>
<body>
    <div id="auth" style="padding:50px">
        <h2>Регистрация Vikhrify</h2>
        <input id="n" placeholder="Имя">
        <input id="u" placeholder="Username">
        <input id="p" type="password" placeholder="Пароль">
        <button onclick="reg()">Создать аккаунт</button>
    </div>

    <div id="app" style="display:none">
        <div id="feed" class="page">
            <h2>Лента</h2>
            <div id="posts-container"></div>
        </div>
        <div class="nav glass">
            <button onclick="show('feed')">Лента</button>
            <button onclick="logout()">Выйти</button>
        </div>
    </div>

    <script>
        async function reg() {
            const res = await fetch('/api/register', { 
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({name:document.getElementById('n').value, username:document.getElementById('u').value, password:document.getElementById('p').value})
            });
            const d = await res.json();
            if(d.success) { localStorage.setItem('u', JSON.stringify(d.user)); location.reload(); }
        }

        async function toggleFollow(targetId) {
            const user = JSON.parse(localStorage.getItem('u'));
            await fetch('/api/follow', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({followerId: user.id, targetId}) });
            loadData();
        }

        async function loadData() {
            const res = await fetch('/api/data');
            const d = await res.json();
            document.getElementById('posts-container').innerHTML = d.posts.map(p => `
                <div class="post">
                    <b>${p.name}</b>
                    <button class="btn-follow" onclick="toggleFollow(${p.userId})">Подписаться</button>
                </div>
            `).join('');
        }
        
        if(localStorage.getItem('u')) { document.getElementById('auth').style.display='none'; document.getElementById('app').style.display='block'; loadData(); }
    </script>
</body>
</html>
