<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    /* Десктоп: боковая панель слева */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 80px;
      background: #111;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      z-index: 1000;
    }

    .sidebar .nav-link {
      color: #aaa;
      font-size: 1.8rem;
      margin: 20px 0;
      transition: all 0.2s;
      cursor: pointer;
    }

    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      color: #0d6efd;
      transform: scale(1.15);
    }

    .main-content {
      margin-left: 80px;
      padding: 20px 40px;
      min-height: 100vh;
    }

    /* Мобильная версия: нижняя панель */
    @media (max-width: 767px) {
      .sidebar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        top: auto;
        height: 70px;
        width: auto;
        flex-direction: row;
        justify-content: space-around;
        padding: 0;
        border-top: 1px solid #222;
        background: #111;
      }

      .sidebar .nav-link {
        margin: 0;
        font-size: 1.6rem;
      }

      .main-content {
        margin-left: 0;
        margin-bottom: 70px;
        padding: 15px;
      }
    }

    .post, .story {
      background: #1f1f1f;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }

    #messages, #privateMessages {
      height: 400px;
      overflow-y: auto;
      background: #1f1f1f;
      padding: 10px;
      border-radius: 8px;
    }

    .badge-vxr { background:#00ff9d; color:#000; padding:4px 10px; border-radius:20px; font-weight:bold; }
    .verified { color: #0d6efd; font-weight:bold; font-size: 1.2rem; }
    .online-item { padding:10px; cursor:pointer; border-bottom:1px solid #333; }
    .online-item:hover { background:#2a2a2a; }
    .avatar-preview {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #0d6efd;
    }

    #loginModal .modal-content { background:#1a1a1a; color:#fff; }
  </style>
</head>
<body>

<!-- Боковая панель / нижняя панель на мобиле -->
<div class="sidebar">
  <i class="bi bi-house-door nav-link active" onclick="showTab(0)" title="Лента"></i>
  <i class="bi bi-clock-history nav-link" onclick="showTab(1)" title="Истории"></i>
  <i class="bi bi-chat-dots nav-link" onclick="showTab(2)" title="Чат"></i>
  <i class="bi bi-person nav-link" onclick="showTab(3)" title="Профиль"></i>
  <i class="bi bi-star nav-link" onclick="showTab(4)" title="Premium"></i>
  <i id="adminIcon" class="bi bi-gear nav-link d-none" onclick="showTab(5)" title="Админ"></i>
</div>

<!-- Основной контент -->
<div class="main-content">

  <!-- Лента (всегда открыта по умолчанию) -->
  <div id="tab0" class="tab-content active">
    <div class="mb-4">
      <button class="btn btn-outline-primary w-100 mb-3" onclick="openLoginIfNeeded('post')">
        <i class="bi bi-plus-lg"></i> Создать пост
      </button>
      <div id="feed"></div>
    </div>
  </div>

  <!-- Истории -->
  <div id="tab1" class="tab-content">
    <button class="btn btn-outline-primary w-100 mb-3" onclick="openLoginIfNeeded('story')">
      <i class="bi bi-plus-lg"></i> Добавить историю
    </button>
    <div id="stories"></div>
  </div>

  <!-- Чат -->
  <div id="tab2" class="tab-content">
    <button class="btn btn-outline-primary w-100 mb-3" onclick="openLoginIfNeeded('chat')">
      <i class="bi bi-plus-lg"></i> Начать чат
    </button>
    <div class="row">
      <div class="col-md-4">
        <h5><i class="bi bi-people"></i> Онлайн</h5>
        <div id="onlineUsers" class="list-group"></div>
      </div>
      <div class="col-md-8">
        <h5 id="chatWith">Чат</h5>
        <div id="privateMessages" class="border p-3 rounded mb-3"></div>
        <form id="privateForm" class="input-group">
          <input id="privateInput" class="form-control bg-dark text-white" placeholder="Сообщение...">
          <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i></button>
        </form>
      </div>
    </div>
  </div>

  <!-- Профиль -->
  <div id="tab3" class="tab-content">
    <div class="text-center mb-4">
      <img id="avatarPreview" src="https://via.placeholder.com/100?text=Аватар" class="avatar-preview" alt="Аватар">
      <input type="file" id="avatarInput" accept="image/*" class="form-control bg-dark text-white mt-2" style="max-width:300px; margin:auto;" onchange="uploadAvatar()">
    </div>
    <h4>Профиль <span id="myVerified" class="verified d-none"><i class="bi bi-patch-check-fill"></i></span></h4>
    <p><strong>Email:</strong> <span id="myEmailDisplay"></span></p>
    <p><strong>VXR:</strong> <span id="vxrBalance" class="badge-vxr">500</span></p>
    <div id="myPosts"></div>
  </div>

  <!-- Premium -->
  <div id="tab4" class="tab-content text-center">
    <h3><i class="bi bi-gem"></i> Premium</h3>
    <div class="d-flex justify-content-center gap-3 flex-wrap">
      <button onclick="openLoginIfNeeded('buy')" class="btn btn-success btn-lg"><i class="bi bi-currency-exchange"></i> VXR</button>
      <button onclick="openLoginIfNeeded('buy')" class="btn btn-warning btn-lg"><i class="bi bi-currency-rupee"></i> Рубли</button>
      <button onclick="openLoginIfNeeded('buy')" class="btn btn-info btn-lg"><i class="bi bi-currency-dollar"></i> $</button>
    </div>
    <div id="premiumStatus" class="mt-4"></div>
  </div>

  <!-- Админ -->
  <div id="tab5" class="tab-content">
    <h4><i class="bi bi-gear"></i> Админ-панель</h4>
    <button onclick="getAdminStats()" class="btn btn-primary mb-3"><i class="bi bi-arrow-repeat"></i> Обновить</button>
    <div id="adminStats" class="alert alert-info"></div>
  </div>

</div>

<!-- Модальное окно входа -->
<div class="modal fade" id="loginModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header border-0">
        <h5 class="modal-title">Вход</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input id="emailInputModal" type="email" class="form-control bg-secondary text-white mb-3" placeholder="Email">
        <button onclick="requestCode()" class="btn btn-primary w-100 mb-3"><i class="bi bi-envelope"></i> Получить код</button>
        <div id="codeBlockModal" class="d-none">
          <input id="codeInputModal" class="form-control bg-secondary text-white mb-3" placeholder="Код из письма">
          <button onclick="verifyCodeModal()" class="btn btn-success w-100"><i class="bi bi-check-lg"></i> Подтвердить</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  const loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
  let myEmail = localStorage.getItem('vikhrify_email') || '';
  let myPremium = localStorage.getItem('premium_' + myEmail) === 'true';
  let myVerified = localStorage.getItem('verified_' + myEmail) === 'true';
  let pendingAction = null; // 'post', 'story', 'chat', 'buy'

  // Автовход
  if (myEmail) {
    socket.emit('loginWithEmail', myEmail);
    document.getElementById('myEmailDisplay').textContent = myEmail;
    document.getElementById('vxrBalance').textContent = myVXR || 500;
    if (myPremium) document.getElementById('premiumPostBtn')?.classList.remove('d-none');
    if (myVerified) document.getElementById('myVerified').classList.remove('d-none');
    if (myEmail === 'admin@vikhrify.ru') document.getElementById('adminIcon').classList.remove('d-none');
  }

  function showTab(n) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab' + n).classList.add('active');
    document.querySelectorAll('.sidebar .nav-link').forEach(i => i.classList.remove('active'));
    document.querySelectorAll('.sidebar .nav-link')[n].classList.add('active');
  }

  function openLoginIfNeeded(action) {
    if (!myEmail) {
      pendingAction = action;
      loginModal.show();
    } else {
      // уже авторизован — выполняем действие
      if (action === 'post') document.getElementById('postText').focus();
      if (action === 'story') document.getElementById('storyText').focus();
      // другие действия можно добавить
    }
  }

  async function requestCode() {
    const email = document.getElementById('emailInputModal').value.trim();
    if (!email) return alert('Введите email');

    try {
      const res = await fetch('/send-code', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email})
      });
      const data = await res.json();
      if (data.success) {
        alert('Код отправлен на ' + email);
        document.getElementById('codeBlockModal').classList.remove('d-none');
      } else {
        alert(data.error || 'Ошибка');
      }
    } catch (err) {
      alert('Ошибка соединения');
    }
  }

  async function verifyCodeModal() {
    const email = document.getElementById('emailInputModal').value.trim();
    const code = document.getElementById('codeInputModal').value.trim();

    try {
      const res = await fetch('/verify-code', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, code})
      });
      const data = await res.json();

      if (data.success) {
        localStorage.setItem('vikhrify_email', email);
        socket.emit('loginWithEmail', email);
        myEmail = email;
        loginModal.hide();
        document.getElementById('myEmailDisplay').textContent = email;

        // Выполняем отложенное действие
        if (pendingAction === 'post') document.getElementById('postText').focus();
        if (pendingAction === 'story') document.getElementById('storyText').focus();
        pendingAction = null;
      } else {
        alert(data.error || 'Неверный код');
      }
    } catch (err) {
      alert('Ошибка соединения');
    }
  }

  // ... (все остальные функции: createPost, renderFeed, чат, buy, admin и т.д. — как в предыдущей версии)
</script>
</body>
</html>
