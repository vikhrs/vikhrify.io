<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: #0d0d0d;
      color: #fff;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 80px;
      background: #111;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      z-index: 1000;
    }
    .sidebar i {
      font-size: 2rem;
      color: #aaa;
      margin: 25px 0;
      cursor: pointer;
      transition: 0.25s;
    }
    .sidebar i:hover,
    .sidebar i.active {
      color: #0d6efd;
      transform: scale(1.15);
    }
    .main-content {
      margin-left: 80px;
      padding: 20px 30px;
    }
    .fab {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      background: #0d6efd;
      border-radius: 50%;
      color: white;
      font-size: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(13,110,253,0.5);
      cursor: pointer;
      z-index: 999;
    }
    .fab:hover {
      transform: scale(1.1);
    }
    .post {
      background: #1f1f1f;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
    }
    @media (max-width: 767px) {
      .sidebar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        top: auto;
        height: 70px;
        flex-direction: row;
        justify-content: space-around;
        padding: 0;
        border-top: 1px solid #222;
      }
      .sidebar i {
        margin: 0;
        font-size: 1.8rem;
      }
      .main-content {
        margin-left: 0;
        margin-bottom: 80px;
        padding: 15px;
      }
    }
  </style>
</head>
<body>

<!-- Боковая панель -->
<div class="sidebar">
  <i class="bi bi-house-door active" onclick="showTab(0)" title="Лента"></i>
  <i class="bi bi-clock-history" onclick="showTab(1)" title="Истории"></i>
  <i class="bi bi-chat-dots" onclick="showTab(2)" title="Чат"></i>
  <i class="bi bi-person" onclick="showTab(3)" title="Профиль"></i>
  <i class="bi bi-star" onclick="showTab(4)" title="Premium"></i>
</div>

<!-- Кнопка + -->
<div class="fab" onclick="openPostModal()"><i class="bi bi-plus-lg"></i></div>

<div class="main-content">

  <!-- Лента (открыта по умолчанию) -->
  <div id="tab0">
    <div id="feed"></div>
  </div>

  <!-- Истории -->
  <div id="tab1" style="display:none;">
    <div id="stories"></div>
  </div>

  <!-- Чат -->
  <div id="tab2" style="display:none;">
    <h4>Чат (пока без функционала)</h4>
  </div>

  <!-- Профиль -->
  <div id="tab3" style="display:none;">
    <h4>Профиль</h4>
    <p>Ваш ник: <span id="myNickname"></span></p>
    <button class="btn btn-outline-light" onclick="changeNickname()">Сменить ник</button>
  </div>

  <!-- Premium -->
  <div id="tab4" style="display:none;">
    <h4>Premium</h4>
    <p>Пока без функционала</p>
  </div>

</div>

<!-- Модалка ввода ника -->
<div class="modal fade" id="nicknameModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title">Введи никнейм</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input id="nicknameInput" class="form-control bg-secondary text-white" placeholder="Твой ник">
        <button class="btn btn-primary w-100 mt-3" onclick="saveNickname()">Сохранить</button>
      </div>
    </div>
  </div>
</div>

<!-- Модалка создания поста -->
<div class="modal fade" id="postModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title">Новый пост</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <textarea id="postText" class="form-control bg-secondary text-white mb-3" rows="4" placeholder="Что нового?"></textarea>
        <button class="btn btn-success w-100" onclick="publishPost()">Опубликовать</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myNickname = localStorage.getItem('vikhrify_nickname') || '';

  if (myNickname) {
    document.getElementById('myNickname').textContent = myNickname;
  }

  function showTab(n) {
    document.querySelectorAll('.main-content > div').forEach(div => div.style.display = 'none');
    document.getElementById('tab' + n).style.display = 'block';
    document.querySelectorAll('.sidebar i').forEach(i => i.classList.remove('active'));
    document.querySelectorAll('.sidebar i')[n].classList.add('active');
  }

  function openPostModal() {
    if (!myNickname) {
      new bootstrap.Modal(document.getElementById('nicknameModal')).show();
    } else {
      new bootstrap.Modal(document.getElementById('postModal')).show();
    }
  }

  function saveNickname() {
    const nick = document.getElementById('nicknameInput').value.trim();
    if (nick) {
      myNickname = nick;
      localStorage.setItem('vikhrify_nickname', nick);
      document.getElementById('myNickname').textContent = nick;
      bootstrap.Modal.getInstance(document.getElementById('nicknameModal')).hide();
      openPostModal(); // после ввода ника сразу открываем пост
    } else {
      alert('Введите никнейм');
    }
  }

  function publishPost() {
    const text = document.getElementById('postText').value.trim();
    if (!text) return alert('Напиши текст поста');

    socket.emit('newPost', { username: myNickname, text });
    document.getElementById('postText').value = '';
    bootstrap.Modal.getInstance(document.getElementById('postModal')).hide();
  }

  // Получаем посты от сервера
  socket.on('postsUpdate', (posts) => {
    let html = '';
    posts.forEach(p => {
      html += `
        <div class="post">
          <strong>${p.username}</strong> <small>${p.time}</small><br>
          ${p.text}
        </div>
      `;
    });
    document.getElementById('feed').innerHTML = html || '<p class="text-center text-muted">Пока нет постов</p>';
  });
</script>
</body>
</html>
