<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <style>
    body { 
      margin:0; padding:0; 
      font-family:Arial,sans-serif; 
      background:#0d1117; 
      color:#c9d1d9; 
      min-height:100vh; 
    }
    #auth { 
      position:fixed; inset:0; 
      background:#0d1117; 
      display:flex; flex-direction:column; align-items:center; justify-content:center; 
      gap:1.5rem; z-index:100; 
    }
    #auth.hidden { display:none; }
    #app { display:none; padding:1rem; padding-bottom:6rem; max-width:900px; margin:0 auto; }
    h1,h2 { color:#58a6ff; text-align:center; }
    input, button { 
      width:100%; max-width:360px; 
      padding:0.8rem; margin:0.5rem 0; 
      border-radius:6px; font-size:1rem; 
    }
    input { border:1px solid #30363d; background:#161b22; color:white; }
    button { border:none; cursor:pointer; font-weight:bold; }
    .btn-reg { background:#238636; color:white; }
    .btn-log { background:#444c56; color:white; }
    .btn-premium { background:#9d7fff; color:black; }
    .btn-voice { background:#6e40c9; color:white; }
    .post { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:1rem; margin:1rem 0; }
    .post img { max-width:100%; border-radius:8px; margin-top:0.5rem; }
    .avatar { width:40px; height:40px; border-radius:50%; background:#444; }
    nav { position:fixed; bottom:0; left:0; right:0; background:#000; display:flex; justify-content:space-around; padding:0.8rem 0; border-top:1px solid #333; }
    nav button { background:none; border:none; color:#aaa; font-size:0.9rem; cursor:pointer; }
    nav button.active { color:#58a6ff; }
    .section { display:none; }
    .section.active { display:block; }
    #msg { text-align:center; margin-top:1rem; font-size:1rem; }
    .ok { color:#3fb950; }
    .err { color:#f85149; }
    #chat-list { margin-top:1rem; background:#161b22; padding:1rem; border-radius:8px; }
    #chat-area { margin-top:1rem; background:#161b22; padding:1rem; border-radius:8px; }
  </style>
</head>
<body>

<div id="auth">
  <h1>Добро пожаловать в Vikhrify!</h1>
  <input id="username" placeholder="Юзернейм" type="text">
  <input id="password" placeholder="Пароль" type="password">
  <button id="reg-btn">Зарегистрироваться</button>
  <button id="log-btn">Войти</button>
  <div id="msg"></div>
</div>

<div id="app">
  <div id="feed" class="section active">
    <h2>Лента</h2>
    <div id="posts"></div>
    <div style="display:flex; justify-content:space-between; margin-top:1rem;">
      <button onclick="addTextPost()" style="background:#ffffff; color:black; width:48%;">+ Текстовой пост</button>
      <button class="btn-voice" onclick="addVoicePost()" style="width:48%;">+ Голосовой пост</button>
    </div>
  </div>

  <div id="chats" class="section">
    <h2>Чаты</h2>
    <input id="chat-user" placeholder="Найдите пользователя по юзернейму">
    <button onclick="startChat()">Найти</button>
    <div id="chat-list"><h3>Последние собеседники</h3><ul id="chat-contacts"></ul></div>
    <div id="chat-area"></div>
  </div>

  <div id="profile" class="section">
    <h2>Профиль</h2>
    <img id="profile-photo" src="https://via.placeholder.com/100?text=Фото" alt="Фото" style="width:100px;height:100px;border-radius:50%;display:block;margin:0 auto;">
    <p>Имя: <span id="profile-name">—</span> <button onclick="editName()">Редактировать</button></p>
    <p>Юзернейм: @<span id="profile-username">—</span></p>
    <p>Фото (URL): <input id="profile-photo-input" placeholder="https://..."><button onclick="updatePhoto()">Сохранить</button></p>
    <p>Баланс: <span id="profile-balance">0 VXR</span></p>
    <p>Верификация: <span id="profile-verified">—</span></p>
    <p>Премиум: <span id="profile-premium">нет</span></p>
    <button class="btn-premium" onclick="buyPremium()">Купить премиум (299 VXR)</button>
  </div>

  <nav>
    <button onclick="showSection('feed')">Лента</button>
    <button onclick="showSection('chats')">Чаты</button>
    <button onclick="showSection('profile')">Профиль</button>
  </nav>
</div>

<script>
// === Основные переменные ===
let currentUser = null;
const msg = document.getElementById('msg');
const usernameInput = document.getElementById('username');
const passwordInput = document.getElementById('password');

// === Функции показа статуса ===
function showStatus(text, type = 'info') {
  if (msg) {
    msg.innerHTML = <span class="${type}">${text}</span>;
  } else {
    alert(text);
  }
}

// === Регистрация ===
async function reg() {
  showStatus('Регистрирую...', 'ok');
  const u = usernameInput?.value?.trim();
  const p = passwordInput?.value;
  if (!u || !p) return showStatus('Заполни юзернейм и пароль', 'err');

  try {
    const r = await fetch('/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: u, password: p})
    });
    const d = await r.json();
    showStatus(d.success ? 'Готово! Заходи' : (d.error || 'Ошибка'), d.success ? 'ok' : 'err');
  } catch {
    showStatus('Сервер не отвечает', 'err');
  }
}

// === Вход ===
async function log() {
  showStatus('Входим...', 'ok');
  const u = usernameInput?.value?.trim();
  const p = passwordInput?.value;
  if (!u || !p) return showStatus('Заполни юзернейм и пароль', 'err');

  try {
    const r = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: u, password: p})
    });
    const d = await r.json();
    if (d.success) {
      currentUser = u;
      showStatus('Ты внутри! Переходим...', 'ok');
      setTimeout(() => {
        document.getElementById('auth')?.classList.add('hidden');
        document.getElementById('app').style.display = 'block';
        // Если есть дополнительные функции — вызывай здесь
        // loadPosts();
        // loadProfile();
      }, 800);
    } else {
      showStatus(d.error || 'Неверно', 'err');
    }
  } catch {
    showStatus('Сервер не отвечает', 'err');
  }
}

// === Привязка событий после загрузки DOM ===
document.addEventListener('DOMContentLoaded', () => {
  const regBtn = document.getElementById('reg-btn');
  const logBtn = document.getElementById('log-btn');

  if (regBtn) regBtn.addEventListener('click', reg);
  if (logBtn) logBtn.addEventListener('click', log);

  // Enter на поле пароля вызывает вход
  if (passwordInput) {
    passwordInput.addEventListener('keypress', e => {
      if (e.key === 'Enter') log();
    });
  }
});
</script>
</body>
</html>
