<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <style>
    :root {
      --violet: #7c3aed;
      --violet-dark: #6d28d9;
    }

    * {
      transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #f4f4f5;
    }

    .chat-bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.4;
    }

    .message-own   { background: var(--violet); color: white; border-bottom-right-radius: 4px; }
    .message-other { background: #1f1f23; border-bottom-left-radius: 4px; }

    .verified { color: #60a5fa; }

    /* Анимации сообщений */
    .msg-enter {
      opacity: 0;
      transform: translateY(18px);
      animation: msgAppear 0.4s forwards;
    }
    @keyframes msgAppear {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Появление модалок */
    .modal-enter {
      opacity: 0;
      transform: scale(0.94) translateY(20px);
      animation: modalFadeIn 0.32s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes modalFadeIn {
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* Hover scale + glow */
    .hover-scale {
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .hover-scale:hover {
      transform: scale(1.03);
      box-shadow: 0 0 0 1px rgba(124, 58, 237, 0.35);
    }

    .btn-pulse {
      animation: btnPulse 1.6s infinite;
    }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.4); }
      50%      { box-shadow: 0 0 0 12px rgba(124, 58, 237, 0); }
    }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, #1f1f23 25%, #2a2a30 50%, #1f1f23 75%);
      background-size: 200% 100%;
      animation: skeletonLoading 1.4s infinite;
    }
    @keyframes skeletonLoading {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

  <!-- Экран авторизации -->
  <div id="auth-screen" class="fixed inset-0 bg-zinc-950 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-10 w-full max-w-md border border-zinc-800 modal-enter">
      <div class="text-center mb-8">
        <div class="inline-block w-16 h-16 bg-violet-600 rounded-3xl flex items-center justify-center text-5xl font-black mb-4 hover-scale">V</div>
        <h1 class="text-4xl font-bold tracking-tight">Vikhrify</h1>
      </div>

      <div class="space-y-4">
        <input id="username" type="text" placeholder="Имя пользователя" autocomplete="username"
               class="w-full bg-zinc-800 rounded-2xl py-4 px-5 outline-none border border-zinc-700 focus:border-violet-500 focus:ring-2 focus:ring-violet-500/30" />
        <input id="password" type="password" placeholder="Пароль" autocomplete="current-password"
               class="w-full bg-zinc-800 rounded-2xl py-4 px-5 outline-none border border-zinc-700 focus:border-violet-500 focus:ring-2 focus:ring-violet-500/30" />

        <button onclick="login()" 
                class="w-full py-4 bg-violet-600 hover:bg-violet-700 rounded-2xl font-semibold mt-2 transition-all hover-scale active:scale-95">
          Войти
        </button>

        <button onclick="register()" 
                class="w-full py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-semibold transition-all hover-scale active:scale-95">
          Создать аккаунт
        </button>

        <p id="auth-message" class="text-center text-sm min-h-[1.25rem]"></p>
      </div>
    </div>
  </div>

  <!-- Основной интерфейс -->
  <div id="main-app" class="hidden flex h-screen">
    <!-- Боковая панель -->
    <div class="w-80 bg-zinc-900 border-r border-zinc-800 flex flex-col">
      <div class="p-4 border-b border-zinc-800 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-violet-600 rounded-2xl flex items-center justify-center text-2xl font-bold hover-scale">V</div>
          <h1 class="text-2xl font-bold tracking-tighter">Vikhrify</h1>
        </div>
        <button onclick="showAdmin()" 
                class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm flex items-center gap-2 hover-scale">
          <i class="fas fa-crown"></i> Админ
        </button>
      </div>

      <button onclick="showCreateChatModal()" 
              class="m-4 py-3 bg-violet-600 hover:bg-violet-700 rounded-2xl font-semibold flex items-center justify-center gap-2 hover-scale active:scale-95 transition-all">
        <i class="fas fa-plus"></i> Новый чат
      </button>

      <div id="chat-list" class="flex-1 overflow-y-auto"></div>
    </div>

    <!-- Основная область чата -->
    <div class="flex-1 flex flex-col">
      <div id="chat-header" class="h-16 border-b border-zinc-800 bg-zinc-900 px-6 flex items-center justify-between">
        <div id="header-content" class="flex items-center gap-4"></div>
        <i onclick="showMyProfile()" class="fas fa-user text-2xl cursor-pointer hover:text-violet-400 hover-scale transition-colors"></i>
      </div>

      <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-6 bg-zinc-950"></div>

      <div class="h-20 border-t border-zinc-800 bg-zinc-900 p-4 flex items-center gap-3 relative">
        <input id="msg-input" type="text" placeholder="Напишите сообщение..." 
               class="flex-1 bg-zinc-800 rounded-3xl py-4 px-6 outline-none text-base focus:ring-2 focus:ring-violet-500/30 transition-all"
               onkeypress="if(event.key==='Enter') sendMessage()" />
        <button onclick="sendMessage()" 
                class="w-12 h-12 bg-violet-600 hover:bg-violet-700 rounded-2xl flex items-center justify-center hover-scale transition-all">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>

    <!-- Правая панель -->
    <div class="w-72 bg-zinc-900 border-l border-zinc-800 p-6 hidden lg:flex flex-col" id="right-panel"></div>
  </div>

  <!-- Модалка создания чата -->
  <div id="create-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl w-96 p-6 modal-enter">
      <h2 class="text-xl font-bold mb-4">Новый чат</h2>
      <input id="user-search" type="text" placeholder="Поиск пользователя..." 
             class="w-full bg-zinc-800 rounded-2xl py-3 px-5 mb-4 outline-none focus:ring-2 focus:ring-violet-500/30"
             oninput="filterUsers()" />
      <div id="user-list" class="max-h-80 overflow-y-auto space-y-2"></div>
      <button onclick="closeModal('create-modal')" class="mt-6 w-full py-3 text-zinc-400 hover:text-white transition-colors">
        Отмена
      </button>
    </div>
  </div>

  <!-- Модалка профиля -->
  <div id="profile-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl w-96 p-8 text-center modal-enter">
      <div id="my-big-avatar" class="text-8xl mx-auto mb-6 hover-scale inline-block"></div>
      <div id="my-username" class="text-2xl font-bold mb-2"></div>
      <div id="my-vxr" class="text-emerald-400 text-xl"></div>
      <button onclick="logout()" class="mt-8 w-full py-4 bg-red-600/20 text-red-400 rounded-2xl hover:bg-red-600/30 transition-all hover-scale">
        Выйти
      </button>
      <button onclick="closeModal('profile-modal')" class="mt-4 text-zinc-500 hover:text-white transition-colors">
        Закрыть
      </button>
    </div>
  </div>

  <!-- Админ-панель -->
  <div id="admin-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-4xl h-[90vh] flex flex-col modal-enter">
      <div class="p-6 border-b border-zinc-800 flex justify-between items-center">
        <h2 class="text-2xl font-bold">Админ Vikhrify</h2>
        <button onclick="closeModal('admin-modal')" class="text-3xl text-zinc-400 hover:text-white transition-colors">×</button>
      </div>
      <div id="admin-content" class="flex-1 p-6 overflow-auto"></div>
    </div>
  </div>

  <script>
    const socket = io();
    let currentUser = null;
    let allUsers = [];
    let myChats = [];
    let currentChatId = null;
    const ADMIN_PASS = "sehpy9-qiqjux-hofgyN";

    async function api(method, url, body = null) {
      try {
        const opts = { 
          method, 
          headers: { 'Content-Type': 'application/json' },
          body: body ? JSON.stringify(body) : null 
        };
        const res = await fetch(url, opts);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } catch (err) {
        console.error(err);
        showAuthMsg("Ошибка соединения", true);
        return { success: false, error: err.message };
      }
    }

    function showAuthMsg(text, isError = true) {
      const el = document.getElementById('auth-message');
      el.textContent = text;
      el.className = isError 
        ? "text-center text-sm text-red-400 mt-4" 
        : "text-center text-sm text-emerald-400 mt-4";
    }

    function closeModal(id) {
      document.getElementById(id)?.classList.add('hidden');
    }

    // ─── Регистрация / Вход ─────────────────────────────────────────────────────

    async function register() {
      const username = document.getElementById('username')?.value?.trim();
      const password = document.getElementById('password')?.value?.trim();

      if (!username || !password) return showAuthMsg("Заполните поля");

      const data = await api('POST', '/api/register', { username, password });
      showAuthMsg(data.success ? "Аккаунт создан! Войдите." : data.error || "Ошибка", !data.success);
    }

    async function login() {
      const username = document.getElementById('username')?.value?.trim();
      const password = document.getElementById('password')?.value?.trim();

      if (!username || !password) return showAuthMsg("Заполните поля");

      const data = await api('POST', '/api/login', { username, password });
      if (data.success) {
        currentUser = data.user;
        localStorage.setItem('vikhrify_user', JSON.stringify(currentUser));

        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');

        await loadAllUsers();
        await loadMyChats();
      } else {
        showAuthMsg(data.error || "Неверные данные");
      }
    }

    // ─── Загрузка данных ────────────────────────────────────────────────────────

    async function loadAllUsers() {
      const data = await api('GET', '/api/users');
      if (data) allUsers = data;
    }

    async function loadMyChats() {
      showSkeleton();
      const data = await api('GET', `/api/my-chats?userId=${currentUser.id}`);
      if (data) {
        myChats = data;
        myChats.forEach(c => socket.emit('join-chat', c.id));
        renderChatList();
        if (myChats.length > 0) openChat(myChats[0].id);
      }
    }

    function showSkeleton() {
      const container = document.getElementById('chat-list');
      if (!container) return;
      container.innerHTML = Array(5).fill().map(() => `
        <div class="p-4 flex gap-4">
          <div class="w-12 h-12 rounded-2xl skeleton"></div>
          <div class="flex-1 space-y-3">
            <div class="h-5 w-3/5 skeleton rounded"></div>
            <div class="h-4 w-4/5 skeleton rounded"></div>
          </div>
        </div>
      `).join('');
    }

    // ─── Рендер списка чатов ────────────────────────────────────────────────────

    function renderChatList() {
      const container = document.getElementById('chat-list');
      if (!container) return;
      container.innerHTML = '';

      myChats.forEach(chat => {
        const otherId = chat.participants.find(id => id !== currentUser.id);
        const other = allUsers.find(u => u.id === otherId);
        if (!other) return;

        const last = chat.messages.length 
          ? chat.messages.at(-1).text.slice(0, 35) + '…' 
          : 'Новый чат';

        const div = document.createElement('div');
        div.className = p-4 hover:bg-zinc-800 cursor-pointer flex gap-4 hover-scale transition-all ${currentChatId === chat.id ? 'bg-zinc-800' : ''};
        div.innerHTML = `
          <div class="text-4xl">${other.emoji}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 font-medium truncate">
              ${other.username}
              ${other.verified ? '<span class="verified text-xl">✔</span>' : ''}
            </div>
            <div class="text-sm text-zinc-400 truncate">${last}</div>
          </div>
        `;
        div.onclick = () => openChat(chat.id);
        container.appendChild(div);
      });
    }

    // ─── Остальные функции (открытие чата, сообщения, создание чата, админка и т.д.) ──
    // ... (оставшиеся функции без изменений, только добавлены классы hover-scale где логично)

    function openChat(chatId) {
      currentChatId = chatId;
      const chat = myChats.find(c => c.id === chatId);
      if (!chat) return;

      const otherId = chat.participants.find(id => id !== currentUser.id);
      const other = allUsers.find(u => u.id === otherId);
      if (!other) return;

      document.getElementById('header-content').innerHTML = `
        <div class="text-4xl hover-scale">${other.emoji}</div>
        <div>
          <div class="font-semibold flex items-center gap-2">
            ${other.username}
            ${other.verified ? '<span class="verified text-2xl">✔</span>' : ''}
          </div>
          <div class="text-xs text-emerald-400">в сети</div>
        </div>
      `;

      document.getElementById('right-panel').innerHTML = `
        <div class="text-center">
          <div class="text-8xl mb-6 hover-scale inline-block">${other.emoji}</div>
          <div class="text-2xl font-bold mb-2">${other.username}</div>
          <div class="text-emerald-400 text-xl">${other.vxr} VXR</div>
          ${other.verified ? <div class="mt-8 text-blue-400 text-4xl">✔ Верифицирован</div> : ''}
        </div>
      `;

      renderMessages(chat);
      renderChatList();
    }

    function renderMessages(chat) {
      const container = document.getElementById('messages');
      if (!container) return;
      container.innerHTML = '';

      chat.messages.forEach((m, i) => {
        const isOwn = m.from === currentUser.id;
        const bubble = document.createElement('div');
        bubble.className = flex ${isOwn ? 'justify-end' : 'justify-start'} msg-enter;
        bubble.style.animationDelay = ${i * 0.05}s;

        bubble.innerHTML = `
          <div class="chat-bubble ${isOwn ? 'message-own' : 'message-other'}">
            ${m.text}
            <div class="text-[10px] mt-1 opacity-70 text-right">${m.time}</div>
          </div>
        `;
        container.appendChild(bubble);
      });

      container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text || !currentChatId) return;

      socket.emit('send-message', { chatId: currentChatId, from: currentUser.id, text });
      input.value = '';

      // пульсация при отправке
      input.classList.add('btn-pulse');
      setTimeout(() => input.classList.remove('btn-pulse'), 1600);
    }

    // ─── Инициализация ──────────────────────────────────────────────────────────

    window.addEventListener('load', () => {
      const saved = localStorage.getItem('vikhrify_user');
      if (saved) {
        try {
          currentUser = JSON.parse(saved);
          document.getElementById('auth-screen').classList.add('hidden');
          document.getElementById('main-app').classList.remove('hidden');
          loadAllUsers().
            then(() => loadMyChats());
        } catch (e) {
          localStorage.removeItem('vikhrify_user');
        }
      }
    });

    // ... (остальные функции: showCreateChatModal, filterUsers, createNewChat, showMyProfile, logout, showAdmin, renderAdminPanel, adminAction и т.д. остаются без изменений)
  </script>
</body>
</html>
